<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通道生命周期可视化分析器 V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: #e2e8f0; 
            min-height: 100vh;
        }
        
        .header {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid #334155;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .upload-section {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .file-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .file-btn.primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }
        
        .file-btn.secondary {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
        }
        
        .file-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .main-container {
            display: flex;
            height: calc(100vh - 44px);
        }
        
        .left-panel {
            width: 345px;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: row;
            background: rgba(15, 23, 42, 0.8);
        }

        .batch-panel {
            width: 170px;
            flex-shrink: 0;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .proxy-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .panel-section {
            padding: 0 12px;
            min-height: 44px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }
        
        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .batch-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .batch-item {
            padding: 10px 12px;
            background: #1e293b;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .batch-item:hover { background: #334155; }
        .batch-item.active {
            background: rgba(59, 130, 246, 0.2);
            box-shadow: inset 0 0 0 2px #3b82f6;
        }
        
        .batch-item .batch-name {
            font-size: 11px;
            font-weight: 600;
            color: #f1f5f9;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        
        .batch-item .batch-info {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }
        
        .proxy-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        
        .proxy-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        
        .proxy-item:hover { background: rgba(59, 130, 246, 0.1); }
        .proxy-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: #3b82f6;
        }
        
        .proxy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .proxy-ip {
            font-size: 13px;
            font-weight: 500;
            color: #f1f5f9;
        }
        
        .proxy-stats {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        
        .stat-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .stat-badge.success { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .stat-badge.fail { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .stat-badge.type { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .stat-badge.risk { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .stat-badge.score { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .stat-badge.early-decay { background: rgba(239, 68, 68, 0.25); color: #f87171; font-weight: 700; }
        .stat-badge.probe { background: rgba(251, 146, 60, 0.25); color: #fb923c; font-weight: 700; }
        .stat-badge.no-probe { background: rgba(34, 197, 94, 0.12); color: #4ade80; font-size: 9px; }

        .target-host-selector {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .target-host-label { font-size: 11px; color: #64748b; white-space: nowrap; }
        .target-host-btn {
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .target-host-btn:hover { background: #334155; color: #e2e8f0; }
        .target-host-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #60a5fa;
            font-weight: 600;
        }
        
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .timeline-controls {
            padding: 12px 24px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        .zoom-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .zoom-label { font-size: 12px; color: #94a3b8; }
        
        .zoom-slider {
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            background: #334155;
            border-radius: 3px;
            outline: none;
        }
        
        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            cursor: pointer;
        }
        
        .zoom-buttons {
            display: flex;
            gap: 4px;
        }
        
        .zoom-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #334155;
            background: #1e293b;
            border-radius: 4px;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .zoom-btn:hover { background: #334155; color: #f1f5f9; }
        
        .time-range-info { font-size: 12px; color: #64748b; }
        
        /* 通道标签宽度 */
        .channel-label-width { width: 60px; }
        
        /* 时间轴容器 - 与通道行对齐 */
        .timeline-ruler-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            height: 36px;
        }
        
        .ruler-label-placeholder {
            width: 60px;
            flex-shrink: 0;
            font-size: 10px;
            color: #64748b;
        }
        
        .timeline-ruler-wrapper {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
        }
        
        .timeline-ruler {
            height: 36px;
            position: relative;
            min-width: 100%;
        }
        
        .ruler-tick {
            position: absolute;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateX(-50%);
        }

        .tick-line { width: 1px; flex-shrink: 0; }
        .tick-line.major   { height: 14px; background: #64748b; }
        .tick-line.minor   { height:  8px; background: #475569; }
        .tick-line.half    { height: 10px; background: #475569; }
        .tick-line.second  { height:  5px; background: #334155; }
        .tick-line.release { position: absolute; top: 0; width: 2px; height: 100%; background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.7); }

        .tick-label { margin-top: 2px; white-space: nowrap; }
        .tick-label.lbl-minute  { font-size: 11px; color: #cbd5e1; }
        .tick-label.lbl-half    { font-size: 10px; color: #94a3b8; }
        .tick-label.lbl-second  { font-size:  8px; color: #475569; }
        .tick-label.lbl-release { font-size: 12px; color: #f59e0b; font-weight: 700; letter-spacing: 0.5px; position: relative; z-index: 1; }
        
        .legend {
            padding: 10px 24px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid #334155;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #94a3b8;
        }
        
        .legend-color { width: 16px; height: 4px; border-radius: 2px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        
        /* 心形图标 */
        .legend-heart {
            color: #3b82f6;
            font-size: 12px;
        }
        
        .channels-view {
            flex: 1;
            overflow: auto;
            padding: 16px 24px;
        }
        
        .channels-container {
            min-width: 100%;
            position: relative;
        }
        
        .channel-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            height: 28px;
        }
        
        .channel-label {
            width: 60px;
            font-size: 11px;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 0;
            position: sticky;
            left: 0;
            background: linear-gradient(90deg, rgba(15, 23, 42, 0.98) 85%, transparent);
            padding-right: 8px;
            z-index: 5;
        }
        
        .channel-timeline {
            flex: 1;
            height: 100%;
            background: #1e293b;
            border-radius: 4px;
            position: relative;
            overflow: visible;
        }
        
        /* 通道条形图 - z-index 较低 */
        .channel-bar {
            position: absolute;
            height: 100%;
            border-radius: 4px;
            transition: opacity 0.2s;
            z-index: 1;
        }
        
        .channel-bar.connecting {
            background: linear-gradient(90deg, #f59e0b, #22c55e);
            opacity: 0.8;
        }
        
        .channel-bar.working { background: #22c55e; opacity: 0.6; }
        .channel-bar.failed { background: #ef4444; opacity: 0.6; }
        .channel-bar.probe-failed { background: linear-gradient(90deg, #f97316, #ef4444); opacity: 0.85; }
        .channel-row.probe-channel-row { background: rgba(251, 146, 60, 0.06); }
        
        /* 事件点 - z-index 较高，确保在条形图上面 */
        .event-dot {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.15s;
        }
        
        .event-dot:hover { transform: translate(-50%, -50%) scale(1.3); }
        
        /* 心跳汇总区域 */
        .heartbeat-summary-section {
            overflow: hidden;
            border-top: 2px solid #1e3a5f;
            padding: 6px 24px;
            background: rgba(15, 23, 42, 0.6);
            flex-shrink: 0;
        }

        .heartbeat-summary-container {
            min-width: 100%;
            position: relative;
        }

        .hb-summary-timeline {
            flex: 1;
            height: 28px;
            background: #0f172a;
            border-radius: 4px;
            position: relative;
            overflow: visible;
        }

        /* 存活数量图表 */
        .alive-chart-row { height: 50px; align-items: stretch; }

        .alive-chart-label {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            padding: 4px 4px;
            font-size: 9px;
            color: #64748b;
            flex-shrink: 0;
            width: 60px;
        }

        .alive-chart-title {
            font-size: 10px;
            font-weight: 600;
            color: #4ade80;
        }

        .alive-chart-timeline {
            flex: 1;
            height: 100%;
            background: #0a0f1e;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        /* 耗时走势图 */
        .duration-chart-header {
            border-top: 1px solid #1e3a5f;
            padding: 3px 24px;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .duration-chart-section {
            overflow: hidden;
            padding: 0 24px 5px;
            background: rgba(15, 23, 42, 0.6);
            flex-shrink: 0;
        }
        .duration-chart-label {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            padding: 2px 4px;
            font-size: 9px;
            color: #64748b;
            flex-shrink: 0;
            width: 60px;
        }
        .duration-chart-row { height: 100px; align-items: stretch; margin-bottom: 0; }
        .duration-chart-timeline {
            flex: 1;
            height: 100%;
            background: #0a0f1e;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .toggle-btn {
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            border: 1px solid #334155;
            background: #1e293b;
            color: #64748b;
            font-family: inherit;
            transition: all 0.15s;
        }
        .toggle-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #60a5fa;
        }
        .toggle-btn:hover { border-color: #475569; color: #94a3b8; }

        .event-dot.heartbeat {
            width: 14px;
            height: 14px;
            font-size: 14px;
            line-height: 14px;
            text-align: center;
            border: none;
            background: transparent;
        }
        
        .event-dot.heartbeat::before {
            content: '♥';
        }
        
        .event-dot.heartbeat-success::before {
            color: #3b82f6;
            text-shadow: 0 0 4px rgba(59, 130, 246, 0.8);
        }
        
        .event-dot.heartbeat-fail::before {
            color: #ef4444;
            text-shadow: 0 0 4px rgba(239, 68, 68, 0.8);
        }
        
        /* 其他事件点 */
        .event-dot.check, .event-dot.check-error, .event-dot.lock, .event-dot.lock-fail, .event-dot.close {
            border-radius: 50%;
            border: 1.5px solid white;
        }
        
        .event-dot.check { background: #eab308; width: 10px; height: 10px; }
        .event-dot.check-error { background: #f97316; width: 10px; height: 10px; }
        .event-dot.lock { background: #a855f7; width: 10px; height: 10px; border-radius: 2px; }
        .event-dot.lock-fail { background: #dc2626; width: 10px; height: 10px; border-radius: 2px; }
        .event-dot.close { background: #ef4444; width: 8px; height: 8px; }
        
        .stats-bar {
            padding: 5px 24px;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid #334155;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        
        .stat-group {
            display: flex;
            gap: 16px;
            padding-right: 24px;
            border-right: 1px solid #334155;
        }
        
        .stat-group:last-child { border-right: none; }
        
        .stat-group-title {
            font-size: 10px;
            color: #64748b;
            margin-bottom: 4px;
        }
        
        .stat-item { font-size: 12px; color: #94a3b8; }
        .stat-item .value { font-weight: 600; margin-left: 4px; }
        
        .tooltip {
            position: fixed;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #f1f5f9;
            white-space: pre-line;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            pointer-events: none;
            max-width: 300px;
        }
        
        .welcome-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        
        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 40px;
        }
        
        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 12px;
        }
        
        .welcome-desc {
            font-size: 14px;
            color: #64748b;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .welcome-features {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .feature-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            width: 180px;
            text-align: left;
        }
        
        .feature-card h4 {
            font-size: 13px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 8px;
        }
        
        .feature-card p { font-size: 11px; color: #64748b; line-height: 1.5; }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 16px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #dc2626;
            border-radius: 8px;
            padding: 16px;
            color: #f87171;
            margin: 20px;
            white-space: pre-line;
        }
        
        .no-data {
            padding: 40px;
            text-align: center;
            color: #64748b;
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        input[type="file"] { display: none; }

        .batch-nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            min-height: 44px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid #334155;
            gap: 12px;
            flex-shrink: 0;
        }

        .batch-nav-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #60a5fa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .batch-nav-btn:hover {
            background: rgba(96, 165, 250, 0.22);
            border-color: rgba(96, 165, 250, 0.55);
        }

        .batch-nav-placeholder {
            width: 80px;
        }

        .batch-db-name {
            font-size: 10px;
            color: #475569;
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .batch-nav-current {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            flex: 1;
        }

        .batch-nav-current span {
            color: #cbd5e1;
            font-weight: 600;
        }

        /* 多选批次·通道视图：批次切换页签 */
        .batch-tab-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 6px 10px;
            border-bottom: 1px solid #334155;
            background: rgba(15, 23, 42, 0.6);
        }
        .batch-tab-label {
            font-size: 11px;
            color: #64748b;
            margin-right: 4px;
            white-space: nowrap;
        }
        .batch-tab {
            font-size: 11px;
            font-family: 'Courier New', monospace;
            padding: 4px 10px;
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;

<body>
    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <div>正在加载 SQL.js...</div>
        </div>
    </div>
    
    <script>
        let SQL = null;
        let ticketDb = null;
        let ticketDbs = []; // { name, db }
        let proxyDb = null;
        
        // Tooltip 相关全局变量
        let tooltipTimeout = null;
        let currentTooltipElement = null;
        
        const state = {
            sqlReady: false,
            ticketDbLoaded: false,
            proxyDbLoaded: false,
            batches: [],
            selectedBatches: [],
            selectedProxy: null,
            lastChannelProxy: null,     // 切回通道视图时恢复的代理
            selectedProxies: new Set(),
            proxyInfo: {},
            processedData: null,
            multiProcessed: {},         // uid -> processedData 缓存（多选批次时按需构建）
            channelBatchUid: null,      // 多选批次·通道视图当前查看的批次 uid
            zoomLevel: 1,
            error: null,
            _uidCounter: 0,
            durationMode: 'proxy',
            durationCursorTime: null,
            selectedTargetHost: null,
            batchDateFilter: null,
            viewMode: 'channel',        // 'channel' | 'trace'
            traceActiveTab: 'overview', // 'overview'|'merged'|'clock'
            traceData: null,
            traceSortState: {},
            traceFilters: { merged: {}, dedup: false },
            autoLoadStatus: null,
            autoLoadError: null,
            riskIps: new Set(),
            riskMobiles: new Set(),
        };
        
        async function initDatabase() {
            try {
                SQL = await initSqlJs({
                    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
                });
                state.sqlReady = true;
                state.error = null;
                render();
                await loadRiskData();
                await autoLoadFromServer();
            } catch (err) {
                console.error('SQL.js init error:', err);
                state.error = `无法加载 SQL.js 库: ${err.message}\n\n请尝试：\n1. 使用 Chrome/Firefox 浏览器\n2. 关闭广告拦截器/隐私防护\n3. 刷新页面重试`;
                render();
            }
        }
        
        async function loadDatabase(file) {
            const arrayBuffer = await file.arrayBuffer();
            return new SQL.Database(new Uint8Array(arrayBuffer));
        }

        async function loadRiskData() {
            try {
                const res = await fetch('/api/logs/risk-data');
                if (!res.ok) return;
                const json = await res.json();
                const d = json.data || {};
                state.riskIps     = new Set(d.riskIps     || []);
                state.riskMobiles = new Set(d.riskMobiles || []);
            } catch (_) {}
        }

        async function autoLoadFromServer() {
            if (!SQL) return;
            state.autoLoadStatus = 'loading';
            render();
            const SERVER_DB_KEY = 'server:ticket_checker.db';
            try {
                const res = await fetch('/api/logs/ticket-db');
                if (!res.ok) {
                    state.autoLoadStatus = res.status === 404 ? 'notfound' : 'error';
                    state.autoLoadError = `HTTP ${res.status}`;
                    render();
                    return;
                }
                const arrayBuffer = await res.arrayBuffer();
                const db = new SQL.Database(new Uint8Array(arrayBuffer));

                const existingIdx = ticketDbs.findIndex(d => d.dbKey === SERVER_DB_KEY);
                if (existingIdx >= 0) {
                    try { ticketDbs[existingIdx].db.close(); } catch(_) {}
                    ticketDbs.splice(existingIdx, 1);
                    state.batches = state.batches.filter(b => b.dbKey !== SERVER_DB_KEY);
                    state.selectedBatches = state.selectedBatches.filter(b => b.dbKey !== SERVER_DB_KEY);
                    state.processedData = null;
                }

                const tables = getTables(db);
                ticketDbs.push({ name: 'ticket_checker.db', dbKey: SERVER_DB_KEY, db });
                const newBatches = getTestBatches(tables, db, 'ticket_checker.db', SERVER_DB_KEY);
                newBatches.forEach(b => {
                    b.uid = state._uidCounter++;
                    detectBatchQueryType(b);
                    state.batches.push(b);
                });
                state.batches.sort((a, b) => b.suffix.localeCompare(a.suffix));
                state.batches = filterLatestBeforeThree(state.batches);
                state.ticketDbLoaded = ticketDbs.length > 0;
                state.autoLoadStatus = 'ok';
                if (state.batches.length > 0 && state.selectedBatches.length === 0) {
                    state.selectedBatches = [state.batches[0]];
                    loadAndProcessBatch();
                }
                render();
            } catch (e) {
                state.autoLoadStatus = 'error';
                state.autoLoadError = e.message;
                render();
            }
        }
        
        function getTables(db) {
            const result = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'");
            if (result.length === 0) return [];
            return result[0].values.map(v => v[0]);
        }
        
        function getChannelRowCount(db, tableName) {
            if (!tableName) return 0;
            try {
                const result = db.exec(`SELECT COUNT(*) FROM "${tableName}"`);
                return (result.length > 0 && result[0].values.length > 0) ? result[0].values[0][0] : 0;
            } catch (e) { return 0; }
        }

        // 每个数据库每天只保留15:00前最近的一个批次
        function filterLatestBeforeThree(batches) {
            // 新格式批次（run_id）不做过滤，全部保留
            const newFormatBatches = batches.filter(b => b._isNewFormat);
            const oldFormatBatches = batches.filter(b => !b._isNewFormat);

            // 提取 suffix 中的 HHMM 部分，兼容两种格式：
            //   新版: YYYYMMDDHHMI        → substring(8, 12)
            //   旧版: YYYYMMDD_HHMMSS_mmm → substring(9, 13)（跳过位置8的下划线）
            const getHHMM = s => {
                if (s.length >= 13 && s[8] === '_') return s.substring(9, 13);
                if (s.length >= 12) return s.substring(8, 12);
                return null;
            };
            const groups = {};
            const irregular = []; // 无法解析格式的批次直接保留
            oldFormatBatches.forEach(b => {
                if (!getHHMM(b.suffix)) { irregular.push(b); return; }
                const date = b.suffix.substring(0, 8);
                const key = `${b.dbKey}|${date}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(b);
            });
            const keep = new Set(irregular);
            Object.values(groups).forEach(group => {
                const beforeThree = group.filter(b => getHHMM(b.suffix) < '1500');
                if (beforeThree.length === 0) return;
                // 取时间最大的（离15:00最近的）
                const latest = beforeThree.reduce((a, b) => b.suffix > a.suffix ? b : a);
                keep.add(latest);
            });
            const filteredOld = oldFormatBatches.filter(b => keep.has(b));
            return [...newFormatBatches, ...filteredOld];
        }

        function getTestBatches(tables, db, dbName, dbKey) {
            // 新格式检测：存在 task_runs 表 + 固定名 channel_logs 表（gamyy-core-20260420+）
            if (tables.includes('task_runs') && tables.includes('channel_logs')) {
                return getTestBatchesNewFormat(db, dbName, dbKey);
            }

            const batches = {};
            const tableSet = new Set(tables);

            // 新版表名规则: channel_logs_<suffix>, heartbeat_logs_<suffix>, check_logs_<suffix>, lock_logs_<suffix>
            const newPatterns = ['channel_logs_', 'heartbeat_logs_', 'check_logs_', 'lock_logs_'];
            tables.forEach(table => {
                newPatterns.forEach(pattern => {
                    if (table.startsWith(pattern)) {
                        const suffix = table.replace(pattern, '');
                        if (!batches[suffix]) {
                            batches[suffix] = { suffix, tables: {}, db, dbName, dbKey };
                        }
                        batches[suffix].tables[pattern.replace('_logs_', '')] = table;
                    }
                });
            });

            // proxy_stats_<suffix> 表检测（关联到已识别的批次）
            tables.forEach(table => {
                if (table.startsWith('proxy_stats_')) {
                    const suffix = table.replace('proxy_stats_', '');
                    if (batches[suffix]) batches[suffix].tables.proxyStats = table;
                }
            });

            // 旧版表名规则: request_logs_<suffix>_channels, request_logs_<suffix>, lock_request_logs_<suffix>
            tables.forEach(table => {
                if (table.startsWith('request_logs_') && table.endsWith('_channels')) {
                    const suffix = table.slice('request_logs_'.length, -'_channels'.length);
                    if (!batches[suffix]) {
                        batches[suffix] = { suffix, tables: {}, db, dbName, dbKey };
                    }
                    batches[suffix].tables.channel = table;
                    const checkTable = `request_logs_${suffix}`;
                    if (tableSet.has(checkTable)) {
                        batches[suffix].tables.check = checkTable;
                    }
                    const lockTable = `lock_request_logs_${suffix}`;
                    if (tableSet.has(lockTable)) {
                        batches[suffix].tables.lock = lockTable;
                    }
                }
            });

            return Object.values(batches).filter(b => {
                if (Object.keys(b.tables).length === 0) return false;
                // channel表无数据则跳过该批次
                return getChannelRowCount(db, b.tables['channel']) > 0;
            }).sort((a, b) => b.suffix.localeCompare(a.suffix));
        }

        // 新格式：从 task_runs 枚举每次运行，固定表名 + run_id 过滤
        function getTestBatchesNewFormat(db, dbName, dbKey) {
            try {
                const result = db.exec(
                    `SELECT id, task_id, task_name, started_at, ended_at, status FROM task_runs ORDER BY id DESC`
                );
                if (!result.length) return [];
                return result[0].values
                    .filter(row => {
                        try {
                            const cnt = db.exec(`SELECT COUNT(*) FROM channel_logs WHERE run_id = ${row[0]}`);
                            return (cnt[0]?.values[0]?.[0] || 0) > 0;
                        } catch(e) { return false; }
                    })
                    .map(row => {
                        const runId    = row[0];
                        const taskName = row[2] || '';
                        const startedAt = row[3] || '';
                        // suffix 格式 YYYYMMDDHHMMSS，用于日期过滤和排序（与旧格式兼容）
                        const suffix = startedAt
                            ? startedAt.replace(/\D/g, '').substring(0, 14)
                            : String(runId).padStart(14, '0');
                        return {
                            suffix,
                            runId,
                            taskName,
                            startedAt,
                            endedAt: row[4],
                            status:  row[5],
                            _isNewFormat: true,
                            tables: {
                                channel:   'channel_logs',
                                check:     'check_logs',
                                lock:      'lock_logs',
                                heartbeat: 'heartbeat_logs',
                            },
                            db, dbName, dbKey,
                        };
                    });
            } catch (e) {
                console.error('getTestBatchesNewFormat error:', e);
                return [];
            }
        }
        
        function loadProxyInfo(db) {
            const proxyInfo = {};
            try {
                // 检测表结构：新版 config.db 用 host 列，旧版 proxies.db 用 ip 列
                const pragmaResult = db.exec("PRAGMA table_info(proxies)");
                if (!pragmaResult.length) return proxyInfo;
                const cols = pragmaResult[0].values.map(r => r[1]);
                const isNewSchema = cols.includes('host') && !cols.includes('ip');

                // 新 schema：直接从同一个 DB 读取风控数据（不依赖 API 时序）
                if (isNewSchema) {
                    try {
                        const rr = db.exec("SELECT ip FROM risk_flagged_ips");
                        if (rr.length > 0) rr[0].values.forEach(r => state.riskIps.add(r[0]));
                    } catch (_) {}
                    try {
                        const ra = db.exec("SELECT mobile FROM accounts WHERE is_risk_flagged = 1");
                        if (ra.length > 0) ra[0].values.forEach(r => state.riskMobiles.add(r[0]));
                    } catch (_) {}
                }

                let result;
                if (isNewSchema) {
                    result = db.exec("SELECT host, port, real_ip, ip_risk_level, ip_location, ip_isp FROM proxies WHERE host IS NOT NULL");
                } else {
                    result = db.exec("SELECT ip, port, ip_type, ip_risk, city, platform FROM proxies");
                }
                if (result.length > 0) {
                    result[0].values.forEach(row => {
                        if (isNewSchema) {
                            const realIp = row[2] || row[0]; // real_ip || host
                            const isRisk = state.riskIps.has(realIp) || state.riskIps.has(row[0]);
                            const info = {
                                ip:       realIp,
                                port:     row[1],
                                ipType:   row[5] || '',   // ip_isp 作为类型显示
                                ipRisk:   isRisk,         // 是否命中风控库（布尔）
                                city:     row[4] || '',   // ip_location
                                platform: row[5] || '',   // ip_isp
                            };
                            // 按 real_ip:port 和 host:port 同时注册
                            if (row[2]) proxyInfo[`${row[2]}:${row[1]}`] = info;
                            if (row[0]) proxyInfo[`${row[0]}:${row[1]}`] = info;
                        } else {
                            const key = `${row[0]}:${row[1]}`;
                            proxyInfo[key] = {
                                ip:       row[0],
                                port:     row[1],
                                ipType:   row[2] || '未知',
                                ipRisk:   row[3] || 0,
                                city:     row[4] || '',
                                platform: row[5] || '',
                            };
                        }
                    });
                }
            } catch (e) {
                console.log('No proxy info available:', e);
            }
            return proxyInfo;
        }
        
        function loadBatchData(db, batch, proxyInfo) {
            const data = {
                channels: [],
                heartbeats: [],
                checkRequests: [],
                lockRequests: [],
                proxyInfo: proxyInfo,
                proxyStats: {}
            };
            
            if (batch.tables.channel) {
                try {
                    const isNew = batch.runId != null;
                    const selectCols = isNew
                        ? `channel_id, proxy_ip, proxy_port, connection_start_time, connection_end_time, connection_duration, connection_status, error_message, target_host, real_proxy_ip`
                        : `channel_id, proxy_ip, proxy_port, connection_start_time, connection_end_time, connection_duration, connection_status, error_message, target_host`;
                    const whereClause = isNew ? `WHERE run_id = ${batch.runId}` : '';
                    const result = db.exec(`
                        SELECT ${selectCols}
                        FROM "${batch.tables.channel}"
                        ${whereClause}
                        ORDER BY channel_id, connection_start_time
                    `);
                    if (result.length > 0) {
                        const channelMap = {};
                        result[0].values.forEach(row => {
                            const id = row[0];
                            const status = row[6];
                            // 新格式优先用 real_proxy_ip（exit IP）作为代理标识
                            const realProxyIp = isNew ? (row[9] || null) : null;
                            const displayIp   = realProxyIp || row[1];
                            const proxy = `${displayIp}:${row[2]}`;

                            if (!channelMap[id]) {
                                channelMap[id] = {
                                    id: id,
                                    proxyIp: displayIp,
                                    proxyPort: row[2],
                                    proxy: proxy,
                                    connectStart: null,
                                    connectEnd: null,
                                    connectDuration: 0,
                                    closeTime: null,
                                    status: 'unknown',
                                    errorMessage: '',
                                    isProbeTest: false,
                                    targetHost: row[8] || ''
                                };
                            }

                            if (status === 'connected') {
                                channelMap[id].connectStart = row[3];
                                channelMap[id].connectEnd = row[4];
                                channelMap[id].connectDuration = row[5] || 0;
                                channelMap[id].status = 'connected';
                                if (row[8]) channelMap[id].targetHost = row[8];
                            } else if (status === 'closed') {
                                channelMap[id].closeTime = row[4];
                                if (channelMap[id].status !== 'connected') {
                                    channelMap[id].status = 'closed';
                                }
                            } else if (status === 'failed') {
                                channelMap[id].connectStart = row[3];
                                channelMap[id].connectEnd = row[4];
                                channelMap[id].connectDuration = row[5] || 0;
                                channelMap[id].errorMessage = row[7] || '';
                                const dur = row[5] || 0;
                                const isTlsRst = !!(row[7] &&
                                    row[7].includes('Client network socket disconnected before secure TLS connection was established') &&
                                    dur >= 3000 && dur <= 4000);
                                channelMap[id].isProbeTest = isTlsRst;
                                channelMap[id].status = 'failed';
                                if (row[8]) channelMap[id].targetHost = row[8];
                            }
                        });

                        data.channels = Object.values(channelMap);
                    }
                } catch (e) { console.error('Error loading channels:', e); }
            }
            
            if (batch.tables.heartbeat) {
                try {
                    let result;
                    let hasDuration = true;
                    if (batch.runId != null) {
                        // 新格式：schema 固定，直接查询
                        result = db.exec(`
                            SELECT channel_id, proxy_ip, proxy_port, start_time, duration, success, status_code, error_message
                            FROM heartbeat_logs
                            WHERE run_id = ${batch.runId}
                        `);
                    } else {
                        // 旧格式：兼容新字段名(start_time)和旧字段名(send_time)，以及有无 duration 列
                        try {
                            result = db.exec(`
                                SELECT channel_id, proxy_ip, proxy_port, start_time, duration, success, status_code, error_message
                                FROM "${batch.tables.heartbeat}"
                            `);
                        } catch (_) {
                            try {
                                result = db.exec(`
                                    SELECT channel_id, proxy_ip, proxy_port, send_time, duration, success, status_code, error_message
                                    FROM "${batch.tables.heartbeat}"
                                `);
                            } catch (_2) {
                                hasDuration = false;
                                try {
                                    result = db.exec(`
                                        SELECT channel_id, proxy_ip, proxy_port, start_time, success, status_code, error_message
                                        FROM "${batch.tables.heartbeat}"
                                    `);
                                } catch (_3) {
                                    result = db.exec(`
                                        SELECT channel_id, proxy_ip, proxy_port, send_time, success, status_code, error_message
                                        FROM "${batch.tables.heartbeat}"
                                    `);
                                }
                            }
                        }
                    }
                    if (result && result.length > 0) {
                        data.heartbeats = result[0].values.map(row => hasDuration ? {
                            channelId: row[0], proxyIp: row[1],
                            proxy: `${row[1]}:${row[2]}`,
                            time: row[3], duration: row[4],
                            success: row[5] === 1, statusCode: row[6], error: row[7]
                        } : {
                            channelId: row[0], proxyIp: row[1],
                            proxy: `${row[1]}:${row[2]}`,
                            time: row[3], duration: null,
                            success: row[4] === 1, statusCode: row[5], error: row[6]
                        });
                    }
                } catch (e) { console.error('Error loading heartbeats:', e); }
            }
            
            if (batch.tables.check) {
                try {
                    const runWhere = batch.runId != null ? `WHERE run_id = ${batch.runId}` : '';
                    const chkCols = (() => { try { return (db.exec(`PRAGMA table_info("${batch.tables.check}")`)[0]?.values||[]).map(r=>r[1]); } catch(e){ return []; } })();
                    const chkHasDuration   = chkCols.includes('duration');
                    const chkHasHasTicket  = chkCols.includes('has_ticket');
                    const chkHasRespData   = chkCols.includes('response_data');
                    let result;
                    try {
                        const cols = ['channel_id','proxy_ip','proxy_port','start_time'];
                        if (chkHasDuration) cols.push('duration');
                        cols.push('status_code','error_message');
                        if (chkHasHasTicket) cols.push('has_ticket');
                        if (!chkHasHasTicket && chkHasRespData) cols.push('response_data');
                        result = db.exec(`SELECT ${cols.join(',')} FROM "${batch.tables.check}" ${runWhere}`);
                        if (result.length > 0) {
                            data.checkRequests = result[0].values.map(row => {
                                let ci = 0;
                                const channelId = row[ci++], proxyIp = row[ci++], proxyPort = row[ci++], time = row[ci++];
                                const duration  = chkHasDuration ? row[ci++] : null;
                                const statusCode = row[ci++], error = row[ci++];
                                const hasTicketRaw  = chkHasHasTicket ? row[ci++] : null;
                                const responseDataRaw = (!chkHasHasTicket && chkHasRespData) ? row[ci++] : null;
                                const hasTicket = hasTicketRaw != null ? hasTicketRaw : deriveHasTicket({ response_data: responseDataRaw });
                                return { channelId, proxyIp, proxy: `${proxyIp}:${proxyPort}`, time, duration, statusCode, error, hasTicket };
                            });
                        }
                    } catch (_) {
                        result = db.exec(`SELECT channel_id, proxy_ip, proxy_port, start_time, status_code, error_message FROM "${batch.tables.check}" ${runWhere}`);
                        if (result.length > 0) {
                            data.checkRequests = result[0].values.map(row => ({
                                channelId: row[0], proxyIp: row[1],
                                proxy: `${row[1]}:${row[2]}`,
                                time: row[3], duration: null,
                                statusCode: row[4], error: row[5], hasTicket: null
                            }));
                        }
                    }
                } catch (e) { console.error('Error loading checks:', e); }
            }
            
            if (batch.tables.lock) {
                try {
                    const runWhere = batch.runId != null ? `WHERE run_id = ${batch.runId}` : '';
                    let result;
                    try {
                        result = db.exec(`
                            SELECT channel_id, proxy_ip, proxy_port, start_time, duration, status_code, error_message, lock_success
                            FROM "${batch.tables.lock}"
                            ${runWhere}
                        `);
                        if (result.length > 0) {
                            data.lockRequests = result[0].values.map(row => ({
                                channelId: row[0], proxyIp: row[1],
                                proxy: `${row[1]}:${row[2]}`,
                                time: row[3], duration: row[4],
                                statusCode: row[5], error: row[6], success: row[7] === 1
                            }));
                        }
                    } catch (_) {
                        result = db.exec(`
                            SELECT channel_id, proxy_ip, proxy_port, start_time, status_code, error_message, lock_success
                            FROM "${batch.tables.lock}"
                            ${runWhere}
                        `);
                        if (result.length > 0) {
                            data.lockRequests = result[0].values.map(row => ({
                                channelId: row[0], proxyIp: row[1],
                                proxy: `${row[1]}:${row[2]}`,
                                time: row[3], duration: null,
                                statusCode: row[4], error: row[5], success: row[6] === 1
                            }));
                        }
                    }
                } catch (e) { console.error('Error loading locks:', e); }
            }

            // proxy_stats 表加载（若存在则直接使用，否则后续从原始数据计算）
            if (batch.tables.proxyStats) {
                try {
                    const result = db.exec(`
                        SELECT proxy_ip, proxy_port, p1_classified_bad, score_total
                        FROM "${batch.tables.proxyStats}"
                    `);
                    if (result.length > 0) {
                        result[0].values.forEach(row => {
                            const key = `${row[0]}:${row[1]}`;
                            data.proxyStats[key] = {
                                isEarlyDecay: row[2] === 1,
                                scoreTotal: typeof row[3] === 'number' ? row[3] : 0
                            };
                        });
                    }
                } catch (e) { console.log('proxy_stats load skipped:', e); }
            }

            return data;
        }
        
        function parseTime(str) {
            if (!str) return null;
            try {
                const [date, time] = str.split(' ');
                const [y, m, d] = date.split('-').map(Number);
                const [h, min, secMs] = time.split(':');
                const [sec, ms] = secMs.split('.').map(Number);
                return new Date(y, m - 1, d, Number(h), Number(min), sec, ms || 0).getTime();
            } catch (e) {
                return null;
            }
        }
        
        function formatTime(ts) {
            if (!ts || !isFinite(ts)) return '--:--:--';
            const d = new Date(ts);
            return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
        }
        
        function formatDuration(ms) {
            if (!ms || !isFinite(ms)) return '0ms';
            if (ms < 1000) return `${Math.round(ms)}ms`;
            if (ms < 60000) return `${(ms/1000).toFixed(2)}s`;
            return `${(ms/60000).toFixed(2)}min`;
        }
        
        // ===== 早衰分类算法（复现自 ScheduledService.classifyAndStopBadProxies） =====
        // proxyLastSuccessMap: { proxyKey: timestamp }
        // 返回早衰代理 key 的 Set
        function classifyEarlyDecayProxies(proxyLastSuccessMap) {
            const proxyTimes = Object.entries(proxyLastSuccessMap)
                .map(([proxyKey, time]) => ({ proxyKey, time }));
            if (proxyTimes.length < 5) return new Set();

            proxyTimes.sort((a, b) => a.time - b.time);

            const gaps = [];
            for (let i = 1; i < proxyTimes.length; i++) {
                gaps.push(proxyTimes[i].time - proxyTimes[i - 1].time);
            }

            // stddev 阈值算法
            const mean = gaps.reduce((s, g) => s + g, 0) / gaps.length;
            const variance = gaps.reduce((s, g) => s + (g - mean) ** 2, 0) / gaps.length;
            const threshold = mean + Math.sqrt(variance);
            const minGapMs = 15000;

            // 找第一个显著间隔
            let splitIndex = -1;
            for (let i = 0; i < gaps.length; i++) {
                if (gaps[i] > threshold && gaps[i] >= minGapMs) { splitIndex = i; break; }
            }
            if (splitIndex === -1) return new Set();

            const bad = new Set();
            for (let i = 0; i <= splitIndex; i++) bad.add(proxyTimes[i].proxyKey);
            return bad;
        }

        // ===== 三维打分算法（复现自 ScheduledService.computeProxyScore） =====
        // 权重: 建连成功率×0.3 + 最后建连时间×0.4 + 最后心跳时间×0.3
        function computeProxyScoreFromRaw(successCount, totalCount, lastSuccessTime, lastHbTime, phase1Start, phase1End, checkStart) {
            const phase1Duration = Math.max(1, phase1End - phase1Start);
            const totalDuration  = Math.max(1, checkStart - phase1Start);

            const channelSuccessRate = totalCount > 0 ? successCount / totalCount : 0;

            const lastSuccessScore = lastSuccessTime > 0
                ? Math.min(1, Math.max(0, (lastSuccessTime - phase1Start) / phase1Duration))
                : 0;

            const lastHbScore = lastHbTime > 0
                ? Math.min(1, Math.max(0, (lastHbTime - phase1Start) / totalDuration))
                : 0;

            return 0.3 * channelSuccessRate + 0.4 * lastSuccessScore + 0.3 * lastHbScore;
        }

        function processData(data) {
            const proxyMap = {};
            let minTime = Infinity, maxTime = -Infinity;
            
            data.channels.forEach(ch => {
                const startTs = parseTime(ch.connectStart);
                const connectEndTs = parseTime(ch.connectEnd);
                const closeTs = parseTime(ch.closeTime);
                
                if (startTs && isFinite(startTs)) minTime = Math.min(minTime, startTs);
                if (connectEndTs && isFinite(connectEndTs)) maxTime = Math.max(maxTime, connectEndTs);
                if (closeTs && isFinite(closeTs)) maxTime = Math.max(maxTime, closeTs);
                
                if (!proxyMap[ch.proxy]) proxyMap[ch.proxy] = [];
                proxyMap[ch.proxy].push({
                    ...ch,
                    startTs,
                    connectEndTs,
                    closeTs,
                    isProbeTest: ch.isProbeTest || false
                });
            });
            
            if (!isFinite(minTime) || !isFinite(maxTime)) {
                minTime = Date.now() - 60000;
                maxTime = Date.now();
            }
            
            const heartbeatMap = {};
            data.heartbeats.forEach(hb => {
                if (!heartbeatMap[hb.channelId]) heartbeatMap[hb.channelId] = [];
                heartbeatMap[hb.channelId].push({ ...hb, ts: parseTime(hb.time) });
            });
            
            const checkMap = {};
            data.checkRequests.forEach(ck => {
                if (!checkMap[ck.channelId]) checkMap[ck.channelId] = [];
                checkMap[ck.channelId].push({ ...ck, ts: parseTime(ck.time) });
            });
            
            const lockMap = {};
            data.lockRequests.forEach(lk => {
                if (!lockMap[lk.channelId]) lockMap[lk.channelId] = [];
                lockMap[lk.channelId].push({ ...lk, ts: parseTime(lk.time) });
            });
            
            const heartbeatByProxy = {};
            data.heartbeats.forEach(hb => {
                if (!heartbeatByProxy[hb.proxy]) heartbeatByProxy[hb.proxy] = [];
                heartbeatByProxy[hb.proxy].push(hb);
            });
            
            const checkByProxy = {};
            data.checkRequests.forEach(ck => {
                if (!checkByProxy[ck.proxy]) checkByProxy[ck.proxy] = [];
                checkByProxy[ck.proxy].push(ck);
            });
            
            const lockByProxy = {};
            data.lockRequests.forEach(lk => {
                if (!lockByProxy[lk.proxy]) lockByProxy[lk.proxy] = [];
                lockByProxy[lk.proxy].push(lk);
            });
            
            // === 计算 P1 阶段结束时间（最后一个建连成功的 connectEnd） ===
            let phase1End = -Infinity;
            Object.values(proxyMap).forEach(chs => {
                chs.forEach(ch => {
                    if (ch.status === 'connected' && ch.connectEndTs && isFinite(ch.connectEndTs)) {
                        phase1End = Math.max(phase1End, ch.connectEndTs);
                    }
                });
            });
            if (!isFinite(phase1End)) phase1End = maxTime;

            // === 计算查票开始时间（第一条查票请求时间） ===
            let checkStart = Infinity;
            data.checkRequests.forEach(ck => {
                const ts = parseTime(ck.time);
                if (ts && isFinite(ts)) checkStart = Math.min(checkStart, ts);
            });
            if (!isFinite(checkStart)) checkStart = phase1End;

            // === 每个代理的最后建连成功时间 ===
            const proxyLastSuccessMap = {};
            Object.entries(proxyMap).forEach(([proxy, chs]) => {
                let last = 0;
                chs.forEach(ch => {
                    if (ch.status === 'connected' && ch.connectEndTs && ch.connectEndTs > last)
                        last = ch.connectEndTs;
                });
                if (last > 0) proxyLastSuccessMap[proxy] = last;
            });

            // === 每个代理的最后心跳成功时间（无心跳数据时为空） ===
            const proxyLastHbMap = {};
            Object.entries(heartbeatByProxy).forEach(([proxy, hbs]) => {
                let last = 0;
                hbs.forEach(hb => {
                    if (hb.success) {
                        const ts = parseTime(hb.time);
                        if (ts && ts > last) last = ts;
                    }
                });
                if (last > 0) proxyLastHbMap[proxy] = last;
            });

            // === 早衰分类：优先用 DB 中 proxy_stats，否则用算法计算 ===
            const hasDbStats = data.proxyStats && Object.keys(data.proxyStats).length > 0;
            const earlyDecaySet = hasDbStats
                ? new Set(Object.entries(data.proxyStats)
                    .filter(([, s]) => s.isEarlyDecay)
                    .map(([k]) => k))
                : classifyEarlyDecayProxies(proxyLastSuccessMap);

            const proxies = Object.entries(proxyMap)
                .map(([proxy, channels]) => {
                    const info = data.proxyInfo[proxy] || {};
                    const successCount = channels.filter(c => c.status === 'connected').length;
                    const failCount = channels.filter(c => c.status === 'failed').length;
                    const probeChannels = channels.filter(c => c.isProbeTest);
                    const hasProbeTest = probeChannels.length > 0;
                    const probeTestStartTime = hasProbeTest
                        ? probeChannels.reduce((mn, c) => (c.startTs && c.startTs < mn ? c.startTs : mn), Infinity)
                        : null;

                    // 打分：优先用 DB 中 proxy_stats，否则从原始数据计算
                    const score = (hasDbStats && data.proxyStats[proxy] !== undefined)
                        ? data.proxyStats[proxy].scoreTotal
                        : computeProxyScoreFromRaw(
                            successCount, channels.length,
                            proxyLastSuccessMap[proxy] || 0,
                            proxyLastHbMap[proxy] || 0,
                            minTime, phase1End, checkStart
                        );

                    return {
                        proxy,
                        channels,
                        total: channels.length,
                        success: successCount,
                        fail: failCount,
                        ip: info.ip || '',
                        ipType: info.ipType || '未知',
                        ipRisk: info.ipRisk || 0,
                        city: info.city || '',
                        platform: info.platform || '',
                        heartbeatCount: (heartbeatByProxy[proxy] || []).length,
                        checkCount: (checkByProxy[proxy] || []).length,
                        lockCount: (lockByProxy[proxy] || []).length,
                        score: score,
                        isEarlyDecay: earlyDecaySet.has(proxy),
                        hasProbeTest,
                        probeTestStartTime: (probeTestStartTime === Infinity ? null : probeTestStartTime),
                        probeTestCount: probeChannels.length
                    };
                })
                .sort((a, b) => b.score - a.score);
            
            return {
                proxies,
                targetHosts: [...new Set(data.channels.map(c => c.targetHost).filter(Boolean))].sort(),
                timeRange: { min: minTime, max: maxTime, span: maxTime - minTime },
                heartbeatMap,
                checkMap,
                lockMap,
                allHeartbeats: Object.values(heartbeatMap).flat(),
                allCheckRequests: Object.values(checkMap).flat(),
                allLockRequests: Object.values(lockMap).flat(),
                totalStats: {
                    totalProxies: proxies.length,
                    totalChannels: data.channels.length,
                    successChannels: data.channels.filter(c => c.status === 'connected').length,
                    failedChannels: data.channels.filter(c => c.status === 'failed').length,
                    heartbeats: data.heartbeats.length,
                    checks: data.checkRequests.length,
                    locks: data.lockRequests.length
                }
            };
        }
        
        function isLocalIp(ip) {
            if (!ip || ip === 'localhost' || ip === '::1') return true;
            return /^127\./.test(ip) || /^10\./.test(ip) ||
                   /^192\.168\./.test(ip) || /^172\.(1[6-9]|2\d|3[01])\./.test(ip);
        }

        function collectEarlyDecayIps(processedData, ipSet) {
            if (!processedData?.proxies) return;
            processedData.proxies.forEach(p => {
                if (!p.isEarlyDecay) return;
                const colonIdx = p.proxy.lastIndexOf(':');
                const ip = colonIdx > 0 ? p.proxy.substring(0, colonIdx) : p.proxy;
                if (!isLocalIp(ip)) ipSet.add(ip);
            });
        }

        async function scanAllBatchesForBlacklist() {
            if (!state.sqlReady || state.batches.length === 0) { alert('请先加载测试数据库'); return; }
            const ips = new Set();
            const total = state.batches.length;
            showProgress('扫描黑名单', 0, total, '');
            for (let i = 0; i < total; i++) {
                const _b = state.batches[i];
                const _label = _b._isNewFormat
                    ? `[${_b.startedAt ? _b.startedAt.substring(11, 19) : 'run#' + _b.runId}] ${_b.taskName || ''}`
                    : _b.suffix;
                updateProgress(i, total, _label);
                await new Promise(r => setTimeout(r, 0));
                try {
                    collectEarlyDecayIps(processData(loadBatchData(state.batches[i].db, state.batches[i], state.proxyInfo)), ips);
                } catch (e) { console.error('扫描批次失败:', state.batches[i].suffix, e); }
            }

            showBlacklistModal(ips);

        function loadAndProcessBatch() {
            state.multiProcessed = {};      // 数据/批次重载，清空多批次处理缓存
            const primary = getPrimaryBatch();
            if (!primary?.db) return;
            const data = loadBatchData(primary.db, primary, state.proxyInfo);
            state.processedData = processData(data);
            state.selectedProxy = state.processedData.proxies[0]?.proxy || null;
            if (state.selectedProxies.size === 0) {
                state.selectedProxies = new Set(state.processedData.proxies.map(p => p.proxy));
            }
            state.durationCursorTime = null;
            state.selectedTargetHost = null;
            state.traceData = null;
        }

        const DB_COLORS = ['#f59e0b', '#22c55e', '#a855f7', '#06b6d4', '#f97316', '#ec4899', '#84cc16'];
        function getDbColorMap() {
            const uniqueKeys = [...new Set(state.batches.map(b => b.dbKey))];
            const map = {};
            uniqueKeys.forEach((key, i) => { map[key] = DB_COLORS[i % DB_COLORS.length]; });
            return map;
        }

        function getPrimaryBatch() { return state.selectedBatches[0] || null; }

        // 按需获取并缓存某个批次的完整 processedData（与单选批次同一套处理逻辑）
        // 缓存键为 batch.uid，selectedBatches 变化或数据重载时由调用方清空 state.multiProcessed
        function getProcessedFor(batch) {
            if (!batch || !batch.db) return null;
            if (!state.multiProcessed[batch.uid]) {
                try {
                    state.multiProcessed[batch.uid] = processData(loadBatchData(batch.db, batch, state.proxyInfo));
                } catch (e) {
                    console.error('getProcessedFor error:', e);
                    return null;
                }
            }
            return state.multiProcessed[batch.uid];
        }

        // 从多个批次构建并集代理列表。数据源与单选批次一致（channel 表 → processData），
        // 因此不会再漏掉只有建连记录但无 check 记录的代理。统计为跨已选批次聚合。
        // 返回 [{proxy, ip, ipType, batches:[uid,...], success, fail, total, heartbeatCount, checkCount, lockCount, score, isEarlyDecay, hasProbeTest, probeTestCount}]
        function buildUnionProxyList(batches) {
            const map = new Map();
            for (const b of batches) {
                const pd = getProcessedFor(b);
                if (!pd) continue;
                for (const p of pd.proxies) {
                    let e = map.get(p.proxy);
                    if (!e) {
                        e = { proxy: p.proxy, ip: p.ip || '', ipType: p.ipType || '未知',
                              batches: [], success: 0, fail: 0, total: 0,
                              heartbeatCount: 0, checkCount: 0, lockCount: 0,
                              score: 0, isEarlyDecay: false, hasProbeTest: false, probeTestCount: 0 };
                        map.set(p.proxy, e);
                    }
                    e.batches.push(b.uid);
                    e.success += p.success; e.fail += p.fail; e.total += p.total;
                    e.heartbeatCount += p.heartbeatCount;
                    e.checkCount += p.checkCount;
                    e.lockCount += p.lockCount;
                    e.score = Math.max(e.score, p.score || 0);
                    e.isEarlyDecay = e.isEarlyDecay || p.isEarlyDecay;
                    e.hasProbeTest = e.hasProbeTest || p.hasProbeTest;
                    e.probeTestCount += p.probeTestCount;
                    if (!e.ip && p.ip) e.ip = p.ip;
                    if ((!e.ipType || e.ipType === '未知') && p.ipType) e.ipType = p.ipType;
                }
            }
            return [...map.values()].sort((a, b) => b.success - a.success);
        }

        // Called when selectedBatches changes
        function onBatchSelectionChanged() {
            state.traceData = null;
            state.multiProcessed = {};      // 批次选择变化，清空多批次处理缓存
            state.channelBatchUid = null;
            const primary = getPrimaryBatch();
            if (state.selectedBatches.length === 1 && primary?.db) {
                const data = loadBatchData(primary.db, primary, state.proxyInfo);
                state.processedData = processData(data);
                state.selectedProxy = state.processedData.proxies[0]?.proxy || null;
                state.selectedProxies = new Set(state.processedData.proxies.map(p => p.proxy));
                state.durationCursorTime = null;
                state.selectedTargetHost = null;
            } else {
                state.processedData = null;
                const proxyList = buildUnionProxyList(state.selectedBatches);
                state.selectedProxies = new Set(proxyList.map(p => p.proxy));
                // 多选批次时通道视图也要能按代理查看：默认选中并集首个代理
                state.selectedProxy = proxyList[0]?.proxy || null;
                state.durationCursorTime = null;
                state.selectedTargetHost = null;
            }
        }

        // Toggle a batch in selectedBatches
        function toggleBatch(uid) {
            const batch = state.batches.find(b => b.uid === uid);
            if (!batch) return;
            const idx = state.selectedBatches.indexOf(batch);
            if (idx >= 0) state.selectedBatches.splice(idx, 1);
            else state.selectedBatches.push(batch);
            onBatchSelectionChanged();
            render();
        }

        // Select all visible batches (respects batchDateFilter)
        function selectAllBatches(selectAll) {
            const visible = state.batchDateFilter
                ? state.batches.filter(b => b.suffix.startsWith(state.batchDateFilter))
                : state.batches;
            state.selectedBatches = selectAll ? [...visible] : [];
            onBatchSelectionChanged();
            render();
        }

        // Toggle a proxy in selectedProxies (trace view)
        function toggleProxy(proxyKey) {
            if (state.selectedProxies.has(proxyKey)) state.selectedProxies.delete(proxyKey);
            else state.selectedProxies.add(proxyKey);
            state.traceData = null;
            render();
        }

        // Select all / deselect all proxies (trace view)
        function selectAllProxies(selectAll) {
            if (selectAll) {
                if (state.selectedBatches.length === 1 && state.processedData) {
                    state.selectedProxies = new Set(state.processedData.proxies.map(p => p.proxy));
                } else {
                    const list = buildUnionProxyList(state.selectedBatches);
                    state.selectedProxies = new Set(list.map(p => p.proxy));
                }
            } else {
                state.selectedProxies = new Set();
            }
            state.traceData = null;
            render();
        }

        function doesProxyExistInBatch(batch, proxy) {
            if (!batch?.db || !proxy) return false;
            try {
                const colonIdx = proxy.lastIndexOf(':');
                const ip = proxy.substring(0, colonIdx);
                const port = proxy.substring(colonIdx + 1);
                let result;
                if (batch.runId != null) {
                    result = batch.db.exec(
                        `SELECT COUNT(*) FROM check_logs WHERE run_id = ${batch.runId} AND proxy_ip = '${ip}' AND proxy_port = ${parseInt(port)}`
                    );
                } else {
                    if (!batch.tables?.channel) return false;
                    result = batch.db.exec(
                        `SELECT COUNT(*) FROM "${batch.tables.channel}" WHERE proxy_ip = '${ip}' AND proxy_port = ${parseInt(port)}`
                    );
                }
                return result.length > 0 && result[0].values[0][0] > 0;
            } catch (e) {
                return false;
            }
        }

        function getBatchNavInfo() {
            const primary = getPrimaryBatch();
            if (!primary || state.batches.length <= 1) {
                return { prev: null, next: null };
            }
            const currentIndex = state.batches.findIndex(b => b === primary);
            if (!state.selectedProxy) {
                return {
                    prev: currentIndex > 0 ? state.batches[currentIndex - 1] : null,
                    next: currentIndex < state.batches.length - 1 ? state.batches[currentIndex + 1] : null
                };
            }
            let prevBatch = null;
            for (let i = currentIndex - 1; i >= 0; i--) {
                if (doesProxyExistInBatch(state.batches[i], state.selectedProxy)) {
                    prevBatch = state.batches[i];
                    break;
                }
            }
            let nextBatch = null;
            for (let i = currentIndex + 1; i < state.batches.length; i++) {
                if (doesProxyExistInBatch(state.batches[i], state.selectedProxy)) {
                    nextBatch = state.batches[i];
                    break;
                }
            }
            return { prev: prevBatch, next: nextBatch };
        }

        function navigateBatch(direction) {
            const navInfo = getBatchNavInfo();
            const targetBatch = direction === -1 ? navInfo.prev : navInfo.next;
            if (!targetBatch) return;
            const previousProxy = state.selectedProxy;
            state.selectedBatches = [targetBatch];
            onBatchSelectionChanged();
            loadAndProcessBatch();
            if (previousProxy && state.processedData?.proxies.find(p => p.proxy === previousProxy)) {
                state.selectedProxy = previousProxy;
            }
            render();
        }
