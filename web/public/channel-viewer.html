        // ═══════════════════════════════════════════════════════════════
        // 请求追踪分析 — 数据构建
        // ═══════════════════════════════════════════════════════════════

        function setViewMode(mode) {
            if (mode === 'trace' && state.viewMode === 'channel') {
                // 通道 → 请求分析：限定范围 = 当前正在看的这一个代理
                state.selectedProxies = new Set(state.selectedProxy ? [state.selectedProxy] : []);
                state.traceData = null;
            }
            if (mode === 'channel' && state.viewMode === 'trace') {
                // 请求分析 → 通道视图：恢复上次查看的代理（若仍在勾选集合中）
                if (state.lastChannelProxy && state.selectedProxies.has(state.lastChannelProxy)) {
                    state.selectedProxy = state.lastChannelProxy;
                } else {
                    state.selectedProxy = [...state.selectedProxies][0] || null;
                }
            }
            state.viewMode = mode;
            render();
        }

        function queryObj(db, sql, params) {
            try {
                const r = db.exec(sql, params);
                if (!r.length || !r[0].values.length) return [];
                const cols = r[0].columns;
                return r[0].values.map(row => { const o={}; cols.forEach((c,i)=>o[c]=row[i]); return o; });
            } catch(e) { console.warn('queryObj:', e); return []; }
        }

        function parseGMTDate(s) { if (!s) return null; try { return new Date(s); } catch(e) { return null; } }
        function gmtToBeijing(s) { const d=parseGMTDate(s); return d ? new Date(d.getTime()+8*3600000) : null; }
        function formatGMTTime(s) {
            const d=gmtToBeijing(s);
            if (!d) return '—';
            return d.toISOString().slice(11,23).replace('T',' ');
        }
        function isGMTBeforeRelease(gmtStr) {
            const d=parseGMTDate(gmtStr);
            if (!d) return null;
            const release=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),7,0,0));
            return d.getTime() < release.getTime();
        }
        function fmtClockOffset(ms) {
            const s=Math.round(ms/1000);
            return (s>=0?'+':'')+s+'s';
        }
        function getResponseDate(row) {
            if (!row.response_headers) return null;
            try { return JSON.parse(row.response_headers).Date || null; } catch(e) { return null; }
        }

        // 从 response_data 推导是否有余票（兼容医生模式和科室模式）
        // 同时兼容旧数据库：若记录上已有 has_ticket 字段则优先使用
        function deriveHasTicket(r) {
            if (r.has_ticket != null) return r.has_ticket === 1;
            if (!r.response_data) return false;
            try {
                const d = typeof r.response_data === 'string' ? JSON.parse(r.response_data) : r.response_data;
                if (!d || d.code !== 0 || !Array.isArray(d.value)) return false;
                for (const item of d.value) {
                    // 医生模式：value[].planList[].remainNum
                    if (item.planList && Array.isArray(item.planList)) {
                        if (item.planList.some(p => p.remainNum > 0)) return true;
                    }
                    // 科室模式：value[].doctorList[].planList[].remainNum
                    if (item.doctorList && Array.isArray(item.doctorList)) {
                        for (const doc of item.doctorList) {
                            if (doc.planList && Array.isArray(doc.planList)) {
                                if (doc.planList.some(p => p.remainNum > 0)) return true;
                            }
                        }
                    }
                }
            } catch(e) {}
            return false;
        }

        function classifyCheckResult(r) {
            if (r._hasTicket===true) return 'ticket';
            const sc=String(r.status_code||'');
            if (sc==='500'||sc==='502'||sc==='503') return sc;
            if (!r.response_data && !r.status_code) return 'noresp';
            if (r.error_message && !r.response_data) return 'noresp';
            return 'noticket';
        }
        function classifyLockResult(r) {
            if (r.lock_success===1) return 'success';
            const sc=String(r.status_code||'');
            if (sc==='500'||sc==='502'||sc==='503') return sc;
            const d=r.response_data||'';
            if (d.includes('高峰期')) return 'peak';
            if (d.includes('号源信息已变更')||d.includes('号源变更')) return 'changed';
            if (d.includes('您已预约该日期该科室')) return 'booked';
            if (d.includes('您的账户已被锁定')) return 'locked';
            if (d.includes('没有可以预约的号了')) return 'noticketlock';
            if (!d&&!r.status_code) return 'noresp';
            if (!d&&r.duration<300) return 'noresp';
            return 'other';
        }

        function buildMergedTraceData(batches, proxyFilter) {
            const proxySet = (proxyFilter && proxyFilter.size > 0) ? proxyFilter : null;
            const allCheckLogs = [], allLockLogs = [];
            let _idxCounter = 0;

            for (const b of batches) {
                if (!b.db) continue;
                try {
                    const checkTable = b.tables.check || `check_logs_${b.suffix}`;
                    const lockTable  = b.tables.lock  || `lock_logs_${b.suffix}`;
                    const chanTable  = b.tables.channel || `channel_logs_${b.suffix}`;
                    const runWhere = b.runId != null ? `WHERE run_id = ${b.runId}` : '';
                    const _checkCols = (() => { try { return (b.db.exec(`PRAGMA table_info("${checkTable}")`)[0]?.values||[]).map(r=>r[1]); } catch(e){ return []; } })();
                    const hasReqData    = _checkCols.includes('request_data');
                    const hasReqHdrs    = _checkCols.includes('request_headers');
                    const hasHasTicket  = _checkCols.includes('has_ticket');
                    const hasTicketDets = _checkCols.includes('ticket_details');
                    const checkRaw = queryObj(b.db, `SELECT id,account_id,mobile,proxy_ip,proxy_port,channel_id,request_index,start_time,end_time,duration,status_code,${hasReqData?'request_data,':''}${hasReqHdrs?'request_headers,':''}response_data,response_headers,error_message,${hasHasTicket?'has_ticket,':''}${hasTicketDets?'ticket_details,':''}submit_sign FROM "${checkTable}" ${runWhere} ORDER BY id`);
                    const _lockCols = (() => { try { return (b.db.exec(`PRAGMA table_info("${lockTable}")`)[0]?.values||[]).map(r=>r[1]); } catch(e){ return []; } })();
                    const hasLockReqHdrs = _lockCols.includes('request_headers');
                    const lockRaw  = queryObj(b.db, `SELECT id,account_id,mobile,proxy_ip,proxy_port,channel_id,request_index,start_time,end_time,duration,status_code,${hasLockReqHdrs?'request_headers,':''}response_data,response_headers,error_message,lock_success,plan_id,patient_id,lock_details,submit_sign,submit_sign_source FROM "${lockTable}" ${runWhere} ORDER BY id`);
                    const chanRaw  = queryObj(b.db, `SELECT channel_id,proxy_ip,proxy_port,target_host,connection_start_time,connection_end_time,connection_duration,connection_status,retry_count,error_message,channel_type FROM "${chanTable}" ${runWhere}`);

                    const chanMap = {};
                    chanRaw.forEach(c => { if (!chanMap[c.channel_id]) chanMap[c.channel_id] = c; });

                    const filterFn = proxySet ? (r => proxySet.has(`${r.proxy_ip}:${r.proxy_port}`)) : () => true;

                    checkRaw.filter(filterFn).forEach(r => {
                        r._batchSuffix = b.suffix;
                        r._batchUid = b.uid;
                        r._uid = b.suffix + '_c_' + r.id;
                        r._idx = _idxCounter++;
                        r._chan = chanMap[r.channel_id] || null;
                        r._serverDate = getResponseDate(r);
                        r._isPreRelease = r._serverDate ? isGMTBeforeRelease(r._serverDate) : null;
                        r._hasTicket = deriveHasTicket(r);
                        r._resultTag = classifyCheckResult(r);
                        r._queryType = r.request_data
                            ? (r.request_data.includes('deptCode') ? 'dept' : r.request_data.includes('doctorCode') ? 'doctor' : 'unknown')
                            : (b._queryType || 'unknown');
                        allCheckLogs.push(r);
                    });

                    lockRaw.filter(filterFn).forEach(r => {
                        r._batchSuffix = b.suffix;
                        r._batchUid = b.uid;
                        r._uid = b.suffix + '_l_' + r.id;
                        r._idx = _idxCounter++;
                        r._chan = chanMap[r.channel_id] || null;
                        r._serverDate = getResponseDate(r);
                        r._isPreRelease = r._serverDate ? isGMTBeforeRelease(r._serverDate) : null;
                        r._resultTag = classifyLockResult(r);
                        allLockLogs.push(r);
                    });
                } catch(e) { console.warn('buildMergedTraceData batch error:', b.suffix, e); }
            }

            // Sort merged logs by start_time
            allCheckLogs.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
            allLockLogs.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));

            // Dedup flags (per-batch, using channel_id scope)
            const checkSeen = new Set(), lockSeen = new Set();
            allCheckLogs.forEach(r => {
                const dk = `${r._batchUid}|${r.channel_id}|${r.submit_sign}|${r._hasTicket}`;
                r._isDup = checkSeen.has(dk) && !!r.submit_sign;
                if (r.submit_sign) checkSeen.add(dk);
            });
            allLockLogs.forEach(r => {
                const dk = `${r._batchUid}|${r.channel_id}|${r.submit_sign}|${r.status_code}|${r.lock_success}`;
                r._isDup = lockSeen.has(dk) && !!r.submit_sign;
                if (r.submit_sign) lockSeen.add(dk);
            });

            const checks = allCheckLogs, locks = allLockLogs;
            const uniqChecks = checks.filter(c => !c._isDup);
            const uniqLocks = locks.filter(l => !l._isDup);

            const signMap = {};
            checks.forEach(r => { if (!r.submit_sign) return; if (!signMap[r.submit_sign]) signMap[r.submit_sign] = {sign:r.submit_sign,checks:[],locks:[]}; signMap[r.submit_sign].checks.push(r); });
            locks.forEach(r => { if (!r.submit_sign) return; if (!signMap[r.submit_sign]) signMap[r.submit_sign] = {sign:r.submit_sign,checks:[],locks:[]}; signMap[r.submit_sign].locks.push(r); });
            Object.values(signMap).forEach(sg => {
                sg.hasSuccess = sg.locks.some(l => l.lock_success === 1);
                sg.hasTicket  = sg.checks.some(c => c._hasTicket === true);
                const tks = sg.checks.filter(c => c._hasTicket === true && c._serverDate);
                tks.sort((a, b) => a._serverDate.localeCompare(b._serverDate));
                sg.firstTicketTime = tks[0]?._serverDate || null;
                sg.firstTicketServer = tks[0]?._chan?.target_host || null;
                sg.checkServers = [...new Set(sg.checks.filter(c => c._chan).map(c => c._chan.target_host))];
                sg.lockServers  = [...new Set(sg.locks.filter(l => l._chan).map(l => l._chan.target_host))];
            });

            const stats = {
                totalChecks: checks.length, uniqChecks: uniqChecks.length,
                withTicket: checks.filter(c => c._hasTicket === true).length,
                uniqWithTicket: uniqChecks.filter(c => c._hasTicket === true).length,
                totalLocks: locks.length, uniqLocks: uniqLocks.length,
                successLocks: locks.filter(l => l.lock_success === 1).length,
                peakLocks: locks.filter(l => l._resultTag === 'peak').length,
                changedLocks: locks.filter(l => l._resultTag === 'changed').length,
                norespLocks: locks.filter(l => l._resultTag === 'noresp').length,
                signs: Object.keys(signMap).length,
                successSigns: Object.values(signMap).filter(s => s.hasSuccess).length,
                check188: checks.filter(c => c._chan?.target_host?.includes('188')).length,
                check189: checks.filter(c => c._chan?.target_host?.includes('189')).length,
                ticket188: checks.filter(c => c._hasTicket === true && c._chan?.target_host?.includes('188')).length,
                ticket189: checks.filter(c => c._hasTicket === true && c._chan?.target_host?.includes('189')).length,
                lock188: locks.filter(l => l._chan?.target_host?.includes('188')).length,
                lock189: locks.filter(l => l._chan?.target_host?.includes('189')).length,
                success188: locks.filter(l => l.lock_success === 1 && l._chan?.target_host?.includes('188')).length,
                success189: locks.filter(l => l.lock_success === 1 && l._chan?.target_host?.includes('189')).length,
                preRelease188: checks.filter(c => c._hasTicket === true && c._isPreRelease === true && c._chan?.target_host?.includes('188')).length,
                preRelease189: checks.filter(c => c._hasTicket === true && c._isPreRelease === true && c._chan?.target_host?.includes('189')).length,
            };
            const tksAll = checks.filter(c => c._hasTicket === true && c._serverDate);
            tksAll.sort((a, b) => a._serverDate.localeCompare(b._serverDate));
            stats.firstTicketOverall = tksAll[0] || null;
            const tk188 = checks.filter(c => c._hasTicket === true && c._serverDate && c._chan?.target_host?.includes('188'));
            tk188.sort((a, b) => a._serverDate.localeCompare(b._serverDate));
            stats.firstTicket188 = tk188[0] || null;
            const tk189 = checks.filter(c => c._hasTicket === true && c._serverDate && c._chan?.target_host?.includes('189'));
            tk189.sort((a, b) => a._serverDate.localeCompare(b._serverDate));
            stats.firstTicket189 = tk189[0] || null;

            // 首次有票本地时间（end_time 最早的有票查号请求）- 全局 + 分服务器
            const tksLocalAll = checks.filter(c => c._hasTicket === true && c.end_time);
            tksLocalAll.sort((a, b) => (a.end_time || '').localeCompare(b.end_time || ''));
            stats.firstTicketLocal = tksLocalAll[0] || null;
            const tksLocal188 = tksLocalAll.filter(c => c._chan?.target_host?.includes('188'));
            stats.firstTicketLocal188 = tksLocal188[0] || null;
            const tksLocal189 = tksLocalAll.filter(c => c._chan?.target_host?.includes('189'));
            stats.firstTicketLocal189 = tksLocal189[0] || null;

            // 首次锁号成功（服务端时间最早 & 本地 end_time 最早）- 全局 + 分服务器
            const successLocks = locks.filter(l => l.lock_success === 1);
            const slWithSrv = successLocks.filter(l => l._serverDate);
            slWithSrv.sort((a, b) => a._serverDate.localeCompare(b._serverDate));
            stats.firstLockServer = slWithSrv[0] || null;
            stats.firstLockServer188 = slWithSrv.find(l => l._chan?.target_host?.includes('188')) || null;
            stats.firstLockServer189 = slWithSrv.find(l => l._chan?.target_host?.includes('189')) || null;
            const slWithLocal = successLocks.filter(l => l.end_time);
            slWithLocal.sort((a, b) => (a.end_time || '').localeCompare(b.end_time || ''));
            stats.firstLockLocal = slWithLocal[0] || null;
            stats.firstLockLocal188 = slWithLocal.find(l => l._chan?.target_host?.includes('188')) || null;
            stats.firstLockLocal189 = slWithLocal.find(l => l._chan?.target_host?.includes('189')) || null;

            // ── 按账号统计 ──────────────────────────────────────
            const _acctMap = {};
            const _ensureAcct = mobile => {
                if (!_acctMap[mobile]) _acctMap[mobile] = {
                    mobile, doctorCode:null, checks:0, ticket:0,
                    locks:0, success:0, peak:0, changed:0,
                    s500:0, s502:0, s503:0,
                    booked:0, lockedTag:0, noticketlock:0, noresp:0, other:0
                };
                return _acctMap[mobile];
            };
            checks.forEach(r => {
                const a = _ensureAcct(r.mobile || '未知');
                a.checks++;
                if (r._hasTicket) a.ticket++;
                if (!a.doctorCode && r.request_data) {
                    try { a.doctorCode = JSON.parse(r.request_data).doctorCode || null; } catch(e) {}
                }
                const t = r._resultTag;
                if (t==='500') a.s500++;
                else if (t==='502') a.s502++;
                else if (t==='503') a.s503++;
                else if (t==='noresp') a.noresp++;
            });
            locks.forEach(r => {
                const a = _ensureAcct(r.mobile || '未知');
                a.locks++;
                const t = r._resultTag;
                if (t==='success') a.success++;
                else if (t==='peak') a.peak++;
                else if (t==='changed') a.changed++;
                else if (t==='500') a.s500++;
                else if (t==='502') a.s502++;
                else if (t==='503') a.s503++;
                else if (t==='booked') a.booked++;
                else if (t==='locked') a.lockedTag++;
                else if (t==='noticketlock') a.noticketlock++;
                else if (t==='noresp') a.noresp++;
                else if (t==='other') a.other++;
            });
            stats.accountStats = Object.values(_acctMap).sort((a,b) => a.mobile.localeCompare(b.mobile));

            const clockOffsets = [];
            checks.forEach(c => {
                if (!c._serverDate || !c.end_time) return;
                const srv = parseGMTDate(c._serverDate)?.getTime();
                if (!srv) return;
                const cli = new Date(c.end_time.replace(' ', 'T') + '+08:00').getTime();
                if (isNaN(cli)) return;
                clockOffsets.push({id:c.id,mobile:c.mobile,target:c._chan?.target_host||'unknown',offsetMs:cli-srv,serverDate:c._serverDate,endTime:c.end_time,duration:c.duration});
            });
            const byTarget = {};
            clockOffsets.forEach(o => { if (!byTarget[o.target]) byTarget[o.target] = []; byTarget[o.target].push(o.offsetMs); });
            const medians = {};
            Object.entries(byTarget).forEach(([t, arr]) => { arr.sort((a, b) => a - b); medians[t] = arr[Math.floor(arr.length / 2)]; });

            const checkIndex = {}, lockIndex = {};
            checks.forEach(r => { checkIndex[r._idx] = r; });
            locks.forEach(r => { lockIndex[r._idx] = r; });

            return { checkLogs: checks, lockLogs: locks, checkIndex, lockIndex, signMap, stats, clockOffsets, clockMedians: medians };
        }

        // ─────────────── 渲染辅助 ────────────────────
        function tServerBadge(host) {
            if(!host) return `<span class="sbadge-unk">—</span>`;
            if(host.includes('188')) return `<span class="sbadge-188">.188</span>`;
            if(host.includes('189')) return `<span class="sbadge-189">.189</span>`;
            return `<span class="sbadge-unk">${host}</span>`;
        }
        function tResultLabel(tag) {
            return {success:'成功',peak:'高峰期',changed:'号源变更',noticket:'无票',ticket:'有票',noresp:'无响应',other:'其他',booked:'已预约',locked:'被锁',noticketlock:'没票了','500':'500','502':'502','503':'503'}[tag]||tag;
        }
        function tChanShort(chan) {
            if(!chan) return '—';
            const id=chan.channel_id||'';
            const parts=id.split('-');
            return parts.length>1?parts[parts.length-1]:id.substring(id.length-8);
        }
        function parseRemainNum(details) {
            if(!details) return null;
            try { const a=JSON.parse(details); if(Array.isArray(a)&&a[0]) return a[0].remainNum??null; } catch(e){}
            return null;
        }
        function extractMsg(data) {
            if(!data) return '';
            try { return JSON.parse(data).msg||''; } catch(e) { const m=data.match(/"msg"\s*:\s*"([^"]+)"/); return m?m[1]:''; }
        }
        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function tSortRows(rows,col,dir) {
            return [...rows].sort((a,b)=>{
                let av=a[col],bv=b[col];
                if(av==null) av=''; if(bv==null) bv='';
                if(typeof av==='number'&&typeof bv==='number') return (av-bv)*dir;
                return String(av).localeCompare(String(bv))*dir;
            });
        }
        function tThCls(tbl,col) {
            const ss=state.traceSortState[tbl]||{};
            if(ss.col!==col) return '';
            return ss.dir===1?'ts-asc':'ts-desc';
        }
        function traceSetSort(tbl,col) {
            if(!state.traceSortState[tbl]) state.traceSortState[tbl]={col:null,dir:1};
            const ss=state.traceSortState[tbl];
            if(ss.col===col) ss.dir*=-1; else { ss.col=col; ss.dir=1; }
            render();
        }
        function traceSetTab(tab) { state.traceActiveTab=tab; render(); }
        function traceSetFilter(type,key,val) { state.traceFilters[type][key]=val; render(); }
        function traceToggleDedup() { state.traceFilters.dedup=!state.traceFilters.dedup; render(); }
        function detectBatchQueryType(b) {
            if (b._queryType !== undefined) return;
            const checkTable = b.tables.check;
            if (!checkTable || !b.db) { b._queryType = 'unknown'; b._firstTicketTag = 'none'; return; }
            try {
                const baseWhere = b.runId != null ? `WHERE run_id = ${b.runId}` : 'WHERE 1=1';
                const pragma = b.db.exec(`PRAGMA table_info("${checkTable}")`);
                const cols = (pragma[0]?.values || []).map(r => r[1]);

                // 查号类型
                if (!cols.includes('request_data')) {
                    b._queryType = 'unknown';
                } else {
                    const rows = b.db.exec(`SELECT request_data FROM "${checkTable}" ${baseWhere} AND request_data IS NOT NULL LIMIT 1`);
                    const rd = rows[0]?.values[0]?.[0] || '';
                    if (rd.includes('deptCode')) b._queryType = 'dept';
                    else if (rd.includes('doctorCode')) b._queryType = 'doctor';
                    else b._queryType = 'unknown';
                }

                // 首次有票时间标签（遍历所有有票记录，按服务器Date找最早）
                b._firstTicketTag = 'none';
                if (cols.includes('response_headers')) {
                    // 兼容新旧格式：先尝试 has_ticket 列，若不存在则从 response_data 派生
                    const _ftCols = cols;
                    let _ftHdrs;
                    if (_ftCols.includes('has_ticket')) {
                        const tr = b.db.exec(`SELECT response_headers FROM "${checkTable}" ${baseWhere} AND has_ticket=1 AND response_headers IS NOT NULL`);
                        _ftHdrs = tr[0]?.values || [];
                    } else {
                        const tr = b.db.exec(`SELECT response_headers, response_data FROM "${checkTable}" ${baseWhere} AND response_headers IS NOT NULL`);
                        _ftHdrs = (tr[0]?.values || []).filter(v => deriveHasTicket({ response_data: v[1] })).map(v => [v[0]]);
                    }
                    const allHdrs = _ftHdrs;
                    let earliestMs = null;
                    for (const [hdrs] of allHdrs) {
                        try {
                            const dateStr = JSON.parse(hdrs).Date;
                            if (!dateStr) continue;
                            const d = parseGMTDate(dateStr);
                            if (!d) continue;
                            const t = d.getTime();
                            if (earliestMs === null || t < earliestMs) earliestMs = t;
                        } catch(e) {}
                    }
                    if (earliestMs !== null) {
                        const d = new Date(earliestMs);
                        const release = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), 7, 0, 0));
                        b._firstTicketTag = earliestMs < release.getTime() ? 'pre' : 'post';
                    }
                }
            } catch(e) { b._queryType = 'unknown'; b._firstTicketTag = 'none'; }
        }

        function copySign(sign,el) { navigator.clipboard.writeText(sign).then(()=>{ el.textContent='已复制'; setTimeout(()=>{ el.textContent=sign; },1200); }); }

        let _modalRows=[], _modalRowRenderer=null, _modalSort={col:'start_time',dir:1};

        }

                        <div>
                            <span style="font-size:12px;color:#64748b;margin-right:8px">Sign</span>

                            <span style="font-size:11px;color:#475569">${_modalRows.length} 条请求</span>

                        </table>

            const rowsHtml = _modalRowRenderer(tSortRows([..._modalRows], _modalSort.col, _modalSort.dir));

            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;';
            modal.innerHTML = `

        function showRowDetail(idx,type) {
            const td=state.traceData;
            if(!td) return;
            const row=(type==='check'?td.checkIndex:td.lockIndex)[idx];
            if(!row) return;
            const ch=row._chan||{};
            const isCheck=type==='check';

            function fmtJson(s) {
                if(s==null) return null;
                const str=String(s).trim();
                try { return JSON.stringify(JSON.parse(str),null,2); } catch(e) { return str; }
            }
            function sectionHdr(t) {
                return `<tr><td colspan="2" style="padding:8px 8px 3px;font-weight:700;color:#60a5fa;font-size:10px;letter-spacing:0.8px;border-top:1px solid #334155;text-transform:uppercase">${t}</td></tr>`;
            }
            function frow(k,v,pre=false) {
                if(v==null||v==='') return '';
                const vStr=String(v);
                const valHtml=pre
                    ?`<pre style="margin:0;white-space:pre-wrap;word-break:break-all;font-size:11px;color:#cbd5e1;max-height:280px;overflow:auto;background:rgba(0,0,0,0.25);padding:6px 8px;border-radius:4px;font-family:'Courier New',monospace">${escHtml(vStr)}</pre>`
                    :`<span style="color:#e2e8f0;font-family:'Courier New',monospace;font-size:11px;word-break:break-all">${escHtml(vStr)}</span>`;
                return `<tr>
                    <td style="padding:3px 8px;color:#64748b;white-space:nowrap;vertical-align:top;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;min-width:90px">${k}</td>
                    <td style="padding:3px 8px;vertical-align:top;border-bottom:1px solid rgba(255,255,255,.04)">${valHtml}</td>
                </tr>`;
            }

            const qtypeLabel=row._queryType==='dept'?'科室查号':row._queryType==='doctor'?'医生查号':null;
            const preLabel=row._isPreRelease===true?'三点前':row._isPreRelease===false?'三点后':null;

            let html='';

            // ── 基本信息 ──
            html+=sectionHdr('基本信息');
            html+=frow('批次',row._batchSuffix);
            html+=frow('ID',row.id);
            html+=frow('账号ID',row.account_id);
            html+=frow('账号',row.mobile);
            html+=frow('代理',`${row.proxy_ip}:${row.proxy_port}`);
            html+=frow('通道ID',row.channel_id);
            html+=frow('请求序号',row.request_index);
            html+=frow('目标服务器',ch.target_host||row._chan?.target_host);
            if(isCheck) html+=frow('查号类型',qtypeLabel);
            html+=frow('客户端start',row.start_time);
            html+=frow('客户端end',row.end_time);
            html+=frow('耗时',row.duration!=null?row.duration+'ms':null);
            html+=frow('状态码',row.status_code!=null?String(row.status_code):null);
            html+=frow('服务端Date',row._serverDate?`${formatGMTTime(row._serverDate)}   (${row._serverDate})`:null);
            html+=frow('时段',preLabel);
            if(isCheck){
                html+=frow('has_ticket',row._hasTicket===true?'1':(row._hasTicket===false?'0':null));
            } else {
                html+=frow('lock_success',row.lock_success!=null?String(row.lock_success):null);
                html+=frow('plan_id',row.plan_id);
                html+=frow('patient_id',row.patient_id);
            }
            html+=frow('Submit Sign',row.submit_sign);
            if(!isCheck) html+=frow('Sign来源',row.submit_sign_source);
            if(row.error_message) html+=frow('错误',row.error_message);

            // ── 请求头 ──
            const reqHdrsStr=fmtJson(row.request_headers);
            if(reqHdrsStr){
                html+=sectionHdr('请求头');
                html+=frow('request_headers',reqHdrsStr,true);
            }

            // ── 请求体 ──
            if(row.request_data!=null){
                html+=sectionHdr('请求体');
                html+=frow('request_data',fmtJson(row.request_data),true);
            }

            // ── 响应内容 ──
            html+=sectionHdr('响应内容');
            const hdrsStr=fmtJson(row.response_headers);
            if(hdrsStr) html+=frow('响应头',hdrsStr,true);
            const respStr=fmtJson(row.response_data);
            html+=frow('响应体',respStr!=null?respStr:'（无响应）',respStr!=null);

            // ── 票务/锁号详情 ──
            if(isCheck&&row.ticket_details!=null){
                // 旧格式数据库仍有 ticket_details 字段，继续显示
                html+=sectionHdr('票务详情');
                html+=frow('ticket_details',fmtJson(row.ticket_details),true);
            } else if(isCheck&&row._hasTicket===true&&row.response_data!=null){
                // 新格式：从 response_data 中提取余票信息展示
                html+=sectionHdr('票务详情');
                try {
                    const rd=typeof row.response_data==='string'?JSON.parse(row.response_data):row.response_data;
                    const tickets=[];
                    if(rd&&Array.isArray(rd.value)){
                        for(const item of rd.value){
                            if(item.planList&&Array.isArray(item.planList)){
                                item.planList.filter(p=>p.remainNum>0).forEach(p=>tickets.push({
                                    deptName:item.deptName||item.clinicLabel,
                                    doctorName:p.doctorName,date:p.date,
                                    timeFrom:p.timeFrom,timeTo:p.timeTo,
                                    remainNum:p.remainNum,fee:p.fee,planId:p.id
                                }));
                            }
                            if(item.doctorList&&Array.isArray(item.doctorList)){
                                for(const doc of item.doctorList){
                                    if(doc.planList&&Array.isArray(doc.planList)){
                                        doc.planList.filter(p=>p.remainNum>0).forEach(p=>tickets.push({
                                            registerTypeName:item.registerTypeName,
                                            deptName:doc.deptName,doctorName:doc.doctorName,
                                            date:p.date,timeFrom:p.timeFrom,timeTo:p.timeTo,
                                            remainNum:p.remainNum,fee:p.fee,planId:p.id
                                        }));
                                    }
                                }
                            }
                        }
                    }
                    if(tickets.length>0) html+=frow('available_tickets',JSON.stringify(tickets,null,2),true);
                } catch(e){}
            }
            if(!isCheck&&row.lock_details!=null){
                html+=sectionHdr('锁号详情');
                html+=frow('lock_details',fmtJson(row.lock_details),true);
            }

            // ── 通道信息 ──
            if(Object.keys(ch).length>1){
                html+=sectionHdr('通道信息');
                ['channel_id','proxy_ip','proxy_port','real_proxy_ip','target_host','channel_type','connection_status','connection_start_time','connection_end_time','connection_duration','retry_count','error_message'].forEach(k=>{
                    if(ch[k]!=null) html+=frow(k,ch[k]);
                });
            }

            const modal=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center" onclick="this.remove()">
                <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;width:min(820px,95vw);max-height:88vh;overflow-y:auto" onclick="event.stopPropagation()">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                        <div>
                            <span style="font-size:14px;font-weight:700;color:#f1f5f9">${isCheck?'查号':'锁号'}请求 #${row.id}</span>
                            <span style="font-size:11px;color:#475569;margin-left:10px;font-family:'Courier New',monospace">${row._batchSuffix||''}</span>
                        </div>
                        <button style="background:none;border:none;color:#64748b;cursor:pointer;font-size:18px;line-height:1;padding:0 4px" onclick="this.closest('[style*=fixed]').remove()">×</button>
                    </div>
                    <table style="width:100%;border-collapse:collapse">${html}</table>
                </div>
            </div>`;
            const el=document.createElement('div'); el.innerHTML=modal; document.body.appendChild(el.firstChild);
        }

        // ── 时钟分析 ──
        function renderTraceClock() {
            const td=state.traceData;
            const medians=td.clockMedians;

            offsets.forEach(o=>{ if(!byTarget[o.target]) byTarget[o.target]=[]; byTarget[o.target].push(o); });

            const summaryRows=Object.entries(medians).map(([t,ms])=>`

                    <td class="${ms>0?'clk-fast':'clk-slow'}">${ms>0?'客户端偏快':'客户端偏慢'}</td>

        // ── 号源监控 ──
        function renderTraceSource() {
            const td = state.traceData;
            if (!td) return `<div style="padding:20px;color:#64748b">暂无数据</div>`;

            const checks = td.checkLogs;
            const locks  = td.lockLogs;

            // 取两者中较早的时间（任一为空则返回另一个；都为空返回 null）
            const earliestTime = (a, b) => (!a) ? (b||null) : (!b) ? a : (a < b ? a : b);
            // 目标服务器分组键
            const SRV_LIST = ['188', '189'];
            const srvKey = host => {
                if (!host) return null;
                if (host.includes('188')) return '188';
                if (host.includes('189')) return '189';
                return null;
            };
            const newSrvData = () => ({
                firstTicket: null, firstNoticketCheck: null, firstNoticketLock: null, firstSuccess: null,
                firstTicketRemainNum: null, firstTicketTotalNum: null,
                lockCount: 0, successCount: 0, noticketCount: 0, lockBeforeSoldOut: 0,
            });
            const ensureSrv = (plan, k) => {
                if (!plan.bySrv[k]) plan.bySrv[k] = newSrvData();
                return plan.bySrv[k];
            };

            // Build per-plan data from lock_logs (have plan_id directly)
            const planMap = {};
            locks.forEach(r => {
                if (!r.plan_id) return;
                if (!planMap[r.plan_id]) planMap[r.plan_id] = {
                    planId: r.plan_id,
                    doctorName: null, deptName: null, date: null, timeFrom: null, timeTo: null,
                    firstTicketTime: null,  // from check_logs: earliest end_time with this plan having remain>0
                    firstNoticketCheckTime: null, // from check_logs: remain=0 for this plan
                    firstNoticketLockTime: null,  // from lock_logs: noticketlock result
                    firstSuccessTime: null,
                    firstTicketRemainNum: null, firstTicketTotalNum: null, // 首次有票时该号源的余票/总数
                    lockCount: 0, successCount: 0, noticketCount: 0,
                    lockBeforeSoldOut: 0,
                    bySrv: {},
                };
                const p = planMap[r.plan_id];
                p.lockCount++;
                const t = r.end_time || r.start_time;
                if (r._resultTag === 'success') {
                    p.successCount++;
                    if (t && (!p.firstSuccessTime || t < p.firstSuccessTime)) p.firstSuccessTime = t;
                }
                if (r._resultTag === 'noticketlock') {
                    p.noticketCount++;
                    if (t && (!p.firstNoticketLockTime || t < p.firstNoticketLockTime)) p.firstNoticketLockTime = t;
                }
                // 按服务器累计
                const k = srvKey(r._chan?.target_host);
                if (k) {
                    const sp = ensureSrv(p, k);
                    sp.lockCount++;
                    if (r._resultTag === 'success') {
                        sp.successCount++;
                        if (t && (!sp.firstSuccess || t < sp.firstSuccess)) sp.firstSuccess = t;
                    }
                    if (r._resultTag === 'noticketlock') {
                        sp.noticketCount++;
                        if (t && (!sp.firstNoticketLock || t < sp.firstNoticketLock)) sp.firstNoticketLock = t;
                    }
                }
            });

            // Derive first-ticket and sold-out times from check_logs response_data
            checks.forEach(r => {
                if (!r.response_data) return;
                const endT = r.end_time;
                if (!endT) return;
                const k = srvKey(r._chan?.target_host);
                try {
                    const rd = JSON.parse(r.response_data);
                    if (!rd || rd.code !== 0 || !Array.isArray(rd.value)) return;
                    rd.value.forEach(item => {
                        const plans = [];
                        // 医生模式: value[].planList — doctorName 在 plan 条目上，deptName 在外层 item
                        if (Array.isArray(item.planList)) item.planList.forEach(p => plans.push({
                            ...p, _doctorName: p.doctorName || null, _deptName: item.deptName || item.clinicLabel || null
                        }));
                        // 科室模式: value[].doctorList[].planList — doctorName/deptName 在 doc 上
                        if (Array.isArray(item.doctorList)) item.doctorList.forEach(doc => {
                            if (Array.isArray(doc.planList)) doc.planList.forEach(p => plans.push({
                                ...p, _doctorName: doc.doctorName || null, _deptName: doc.deptName || null
                            }));
                        });
                        plans.forEach(p => {
                            const pid = p.id;
                            if (!pid) return;
                            if (!planMap[pid]) planMap[pid] = {
                                planId: pid,
                                doctorName: null, deptName: null, date: null, timeFrom: null, timeTo: null,
                                firstTicketTime: null, firstNoticketCheckTime: null,
                                firstNoticketLockTime: null, firstSuccessTime: null,
                                firstTicketRemainNum: null, firstTicketTotalNum: null,
                                lockCount: 0, successCount: 0, noticketCount: 0,
                                lockBeforeSoldOut: 0,
                                bySrv: {},
                            };
                            const pm = planMap[pid];
                            if (!pm.doctorName && p._doctorName) pm.doctorName = p._doctorName;
                            if (!pm.deptName   && p._deptName)   pm.deptName   = p._deptName;
                            if (!pm.date       && p.date)        pm.date       = p.date;
                            if (!pm.timeFrom   && p.timeFrom)    pm.timeFrom   = p.timeFrom;
                            if (!pm.timeTo     && p.timeTo)      pm.timeTo     = p.timeTo;
                            if (p.remainNum > 0) {
                                if (!pm.firstTicketTime || endT < pm.firstTicketTime) {
                                    pm.firstTicketTime = endT;
                                    pm.firstTicketRemainNum = (typeof p.remainNum === 'number') ? p.remainNum : null;
                                    pm.firstTicketTotalNum  = (typeof p.totalNum  === 'number') ? p.totalNum  : null;
                                }
                            } else {
                                if (!pm.firstNoticketCheckTime || endT < pm.firstNoticketCheckTime) pm.firstNoticketCheckTime = endT;
                            }
                            // 按服务器累计
                            if (k) {
                                const sp = ensureSrv(pm, k);
                                if (p.remainNum > 0) {
                                    if (!sp.firstTicket || endT < sp.firstTicket) {
                                        sp.firstTicket = endT;
                                        sp.firstTicketRemainNum = (typeof p.remainNum === 'number') ? p.remainNum : null;
                                        sp.firstTicketTotalNum  = (typeof p.totalNum  === 'number') ? p.totalNum  : null;
                                    }
                                } else {
                                    if (!sp.firstNoticketCheck || endT < sp.firstNoticketCheck) sp.firstNoticketCheck = endT;
                                }
                            }
                        });
                    });
                } catch(e) {}
            });

            // 二轮：售罄前锁号次数（lock.start_time < 售罄时间，售罄时间取两者中较早）
            locks.forEach(r => {
                if (!r.plan_id || !r.start_time) return;
                const pm = planMap[r.plan_id];
                if (!pm) return;
                const sot = earliestTime(pm.firstNoticketLockTime, pm.firstNoticketCheckTime);
                if (sot && r.start_time < sot) pm.lockBeforeSoldOut++;
                // 按各自服务器的售罄时间分界
                const k = srvKey(r._chan?.target_host);
                if (k && pm.bySrv[k]) {
                    const sp = pm.bySrv[k];
                    const ssot = earliestTime(sp.firstNoticketLock, sp.firstNoticketCheck);
                    if (ssot && r.start_time < ssot) sp.lockBeforeSoldOut++;
                }
            });

            const planEntries = Object.values(planMap);
            if (planEntries.length === 0) {
                return `<div style="padding:20px;color:#64748b">暂无号源数据（无锁号记录且无有票查号记录）</div>`;
            }

            // Sort by first ticket time, then by first success time
            planEntries.sort((a, b) => {
                const ta = a.firstTicketTime || a.firstSuccessTime || '9';
                const tb = b.firstTicketTime || b.firstSuccessTime || '9';
                return ta.localeCompare(tb);
            });

            const fmtT = t => t ? t.substring(11,23) : '—';
            // 售罄时间 = 锁号反馈最早时间 与 查号余票0最早时间 中**较早**的那个
            const soldOutTime = p => earliestTime(p.firstNoticketLockTime, p.firstNoticketCheckTime);
            // 售罄来源 = 取上面"较早"信号的来源
            const soldOutSource = p => {
                const lt = p.firstNoticketLockTime, ct = p.firstNoticketCheckTime;
                if (!lt && !ct) return null;
                if (!ct) return '锁号反馈';
                if (!lt) return '查号余票0';
                return lt <= ct ? '锁号反馈' : '查号余票0';
            };
            const hasSoldOut = p => !!(soldOutTime(p));
            const hasTicket  = p => !!(p.firstTicketTime);
            const isLive     = p => hasTicket(p) && !hasSoldOut(p);
            const duration   = p => {
                if (!p.firstTicketTime || !soldOutTime(p)) return null;
                const ms = new Date(soldOutTime(p)) - new Date(p.firstTicketTime);
                return ms >= 0 ? `${(ms/1000).toFixed(1)}s` : null;
            };

            // 各服务器的 sold-out 时间 & 来源（同样取两者中较早）
            const srvSoldOut   = sp => sp ? earliestTime(sp.firstNoticketLock, sp.firstNoticketCheck) : null;
            const srvSotSource = sp => {
                if (!sp) return null;
                const lt = sp.firstNoticketLock, ct = sp.firstNoticketCheck;
                if (!lt && !ct) return null;
                if (!ct) return '锁号反馈';
                if (!lt) return '查号余票0';
                return lt <= ct ? '锁号反馈' : '查号余票0';
            };
            // 时间单元格
            const tdTime = (t, color) => `<td class="mono text-xs" style="padding:2px 8px;text-align:right;color:${t?color:'#475569'}">${fmtT(t)}</td>`;
            // 余票/总数单元格
            const tdRemain = (remain, total) => {
                if (remain == null && total == null) {
                    return `<td class="mono text-xs" style="padding:2px 8px;text-align:right;color:#475569">—</td>`;
                }
                return `<td class="mono text-xs" style="padding:2px 8px;text-align:right;color:#e2e8f0">${remain==null?'—':remain}<span style="color:#475569">/</span>${total==null?'—':total}</td>`;
            };
            // 锁号次数单元格（对象可能为空 —— 该服务器从未锁过这个号源）
            const tdLockCell = (data, hasSO, color) => {
                if (!data || data.lockCount === 0) {
                    return `<td class="mono text-xs" style="padding:2px 8px;text-align:right;color:#475569">—</td>`;
                }
                return `<td class="mono text-xs" style="padding:2px 8px;text-align:right;color:${color}">${data.lockCount}（${hasSO?`售罄前 ${data.lockBeforeSoldOut}，`:''}成功${data.successCount}，没票${data.noticketCount}）</td>`;
            };

            const planCards = planEntries.map(p => {
                const live = isLive(p);
                const dur  = duration(p);
                const sot  = soldOutTime(p);
                const sotSource = soldOutSource(p);
                const sp188 = p.bySrv['188'] || null;
                const sp189 = p.bySrv['189'] || null;
                const sot188 = srvSoldOut(sp188);
                const sot189 = srvSoldOut(sp189);
                const src188 = srvSotSource(sp188);
                const src189 = srvSotSource(sp189);

                return `<div class="trace-card" style="margin-bottom:10px">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">
                        ${live
                            ? `<span style="background:rgba(34,197,94,.2);color:#4ade80;border:1px solid rgba(34,197,94,.4);border-radius:4px;padding:1px 8px;font-size:11px">🟢 有号</span>`
                            : hasSoldOut(p)
                                ? `<span style="background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3);border-radius:4px;padding:1px 8px;font-size:11px">⚫ 已售罄</span>`
                                : `<span style="background:rgba(100,116,139,.1);color:#475569;border:1px solid rgba(100,116,139,.2);border-radius:4px;padding:1px 8px;font-size:11px">— 未知</span>`}
                        ${dur ? `<span style="font-size:11px;color:#fbbf24">持续 ${dur}</span>` : ''}
                        ${p.successCount > 0 ? `<span style="background:rgba(34,197,94,.15);color:#4ade80;border-radius:4px;padding:1px 6px;font-size:11px">锁号成功×${p.successCount}</span>` : ''}
                    </div>
                    ${(p.doctorName||p.deptName||p.date) ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
                        ${p.doctorName ? `<span style="font-size:13px;font-weight:600;color:#e2e8f0">${escHtml(p.doctorName)}</span>` : ''}
                        ${p.deptName   ? `<span style="font-size:11px;color:#64748b">${escHtml(p.deptName)}</span>` : ''}
                        ${p.date       ? `<span class="mono text-xs" style="color:#94a3b8">${escHtml(p.date)}${p.timeFrom?` ${escHtml(p.timeFrom)}-${escHtml(p.timeTo||'')}`:''}</span>` : ''}
                    </div>` : ''}
                    <div style="font-size:10px;color:#475569;margin-bottom:6px;font-family:monospace">plan_id: ${escHtml(p.planId)}</div>
                    <table style="width:100%;border-collapse:collapse;table-layout:fixed">
                        <thead>
                            <tr style="font-size:11px;color:#94a3b8">
                                <th style="padding:2px 8px;text-align:left;font-weight:500;width:110px"></th>
                                <th style="padding:2px 8px;text-align:right;font-weight:500;width:30%">全部</th>
                                <th style="padding:2px 8px;text-align:right;font-weight:500;width:30%">.188</th>
                                <th style="padding:2px 8px;text-align:right;font-weight:500;width:30%">.189</th>
                            </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td style="padding:2px 8px;font-size:11px;color:#64748b">首次有票（查号）</td>
                            ${tdTime(p.firstTicketTime, '#4ade80')}
                            ${tdTime(sp188?.firstTicket, '#4ade80')}
                            ${tdTime(sp189?.firstTicket, '#4ade80')}
                        </tr>
                        <tr>
                            <td style="padding:2px 8px;font-size:11px;color:#64748b">首次有票余票/总数</td>
                            ${tdRemain(p.firstTicketRemainNum, p.firstTicketTotalNum)}
                            ${tdRemain(sp188?.firstTicketRemainNum, sp188?.firstTicketTotalNum)}
                            ${tdRemain(sp189?.firstTicketRemainNum, sp189?.firstTicketTotalNum)}
                        </tr>
                        <tr>
                            <td style="padding:2px 8px;font-size:11px;color:#64748b">售罄时间${sotSource?`（${sotSource}）`:''}</td>
                            ${tdTime(sot, '#f87171')}
                            <td class="mono text-xs" style="padding:2px 8px;text-align:right;color:${sot188?'#f87171':'#475569'}">${fmtT(sot188)}${src188&&src188!==sotSource?`<span style="margin-left:4px;font-size:10px;color:#64748b">(${src188})</span>`:''}</td>
                            <td class="mono text-xs" style="padding:2px 8px;text-align:right;color:${sot189?'#f87171':'#475569'}">${fmtT(sot189)}${src189&&src189!==sotSource?`<span style="margin-left:4px;font-size:10px;color:#64748b">(${src189})</span>`:''}</td>
                        </tr>
                        ${p.firstSuccessTime ? `<tr>
                            <td style="padding:2px 8px;font-size:11px;color:#64748b">首次锁成功</td>
                            ${tdTime(p.firstSuccessTime, '#4ade80')}
                            ${tdTime(sp188?.firstSuccess, '#4ade80')}
                            ${tdTime(sp189?.firstSuccess, '#4ade80')}
                        </tr>` : ''}
                        <tr>
                            <td style="padding:2px 8px;font-size:11px;color:#64748b">锁号次数</td>
                            ${tdLockCell({lockCount:p.lockCount,lockBeforeSoldOut:p.lockBeforeSoldOut,successCount:p.successCount,noticketCount:p.noticketCount}, hasSoldOut(p), '#e2e8f0')}
                            ${tdLockCell(sp188, !!sot188, '#e2e8f0')}
                            ${tdLockCell(sp189, !!sot189, '#e2e8f0')}
                        </tr>
                        </tbody>
                    </table>
                </div>`;
            }).join('');

            const liveCount    = planEntries.filter(isLive).length;
            const soldOutCount = planEntries.filter(hasSoldOut).length;
            const successTotal = planEntries.reduce((s, p) => s + p.successCount, 0);

            // 按目标服务器分别统计（派生自 planMap.bySrv）
            const srvStats = {};
            SRV_LIST.forEach(k => {
                const seen    = planEntries.filter(p => p.bySrv[k]).length;
                const ticket  = planEntries.filter(p => p.bySrv[k]?.firstTicket).length;
                const soldOut = planEntries.filter(p => p.bySrv[k] && (p.bySrv[k].firstNoticketLock || p.bySrv[k].firstNoticketCheck)).length;
                const success = planEntries.reduce((s, p) => s + (p.bySrv[k]?.successCount || 0), 0);
                srvStats[k] = { seen, ticket, soldOut, success };
            });

            const statRow = (label, n, t, s, ok) => `
                <tr style="border-top:1px solid #1e293b">
                    <td style="padding:4px 10px;color:#e2e8f0">${label}</td>
                    <td class="mono" style="padding:4px 10px;color:#60a5fa;text-align:right">${n}</td>
                    <td class="mono" style="padding:4px 10px;color:${t>0?'#4ade80':'#475569'};text-align:right">${t}</td>
                    <td class="mono" style="padding:4px 10px;color:${s>0?'#f87171':'#475569'};text-align:right">${s}</td>
                    <td class="mono" style="padding:4px 10px;color:${ok>0?'#4ade80':'#475569'};text-align:right">${ok}</td>
                </tr>`;

            return `<div class="trace-overview">
                <div class="trace-card" style="margin-bottom:12px">
                    <div class="trace-card-title">号源状态汇总（基于查号/锁号日志分析）</div>
                    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:6px">
                        <thead>
                            <tr style="color:#94a3b8;font-size:11px">
                                <th style="text-align:left;padding:4px 10px;font-weight:500">服务器</th>
                                <th style="text-align:right;padding:4px 10px;font-weight:500">号源数</th>
                                <th style="text-align:right;padding:4px 10px;font-weight:500">曾有票</th>
                                <th style="text-align:right;padding:4px 10px;font-weight:500">已售罄</th>
                                <th style="text-align:right;padding:4px 10px;font-weight:500">锁号成功</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${statRow('全部', planEntries.length, planEntries.filter(hasTicket).length, soldOutCount, successTotal)}
                            ${SRV_LIST.map(k => statRow(`.${k}`, srvStats[k].seen, srvStats[k].ticket, srvStats[k].soldOut, srvStats[k].success)).join('')}
                        </tbody>
                    </table>
                </div>
                ${planCards}
            </div>`;
        }

        // ═══════════════════════════════════════════════════════════════
        // 主渲染
        // ═══════════════════════════════════════════════════════════════

        // ── 共用：按目标服务器过滤代理统计（左侧面板与右侧统计栏共用）────────────────────────────
        function getFilteredStats(proxy) {
            const pd = state.processedData;
            if (!state.selectedTargetHost || !proxy || !pd) {
                return {
                    success: proxy?.success || 0,
                    fail: proxy?.fail || 0,
                    heartbeatCount: proxy?.heartbeatCount || 0,
                    checkCount: proxy?.checkCount || 0,
                    lockCount: proxy?.lockCount || 0,
                    hasProbeTest: proxy?.hasProbeTest || false,
                    probeTestCount: proxy?.probeTestCount || 0,
                    probeTestStartTime: proxy?.probeTestStartTime || null
                };
            }
            const th = state.selectedTargetHost;
            const filteredChannels = proxy.channels.filter(c => c.targetHost === th);
            const channelIds = new Set(filteredChannels.map(c => String(c.id)));
            const hbCount = Object.entries(pd.heartbeatMap)
                .filter(([cid]) => channelIds.has(String(cid)))
                .reduce((sum, [, hbs]) => sum + hbs.length, 0);
            const checkCount = Object.entries(pd.checkMap)
                .filter(([cid]) => channelIds.has(String(cid)))
                .reduce((sum, [, cks]) => sum + cks.length, 0);
            const lockCount = Object.entries(pd.lockMap)
                .filter(([cid]) => channelIds.has(String(cid)))
                .reduce((sum, [, lks]) => sum + lks.length, 0);
            const probeChannels = filteredChannels.filter(c => c.isProbeTest);
            const hasProbeTest = probeChannels.length > 0;
            const probeStartTs = hasProbeTest
                ? probeChannels.reduce((mn, c) => (c.startTs && c.startTs < mn ? c.startTs : mn), Infinity)
                : null;
            return {
                success: filteredChannels.filter(c => c.status === 'connected').length,
                fail: filteredChannels.filter(c => c.status === 'failed').length,
                heartbeatCount: hbCount,
                checkCount,
                lockCount,
                hasProbeTest,
                probeTestCount: probeChannels.length,
                probeTestStartTime: (probeStartTs === Infinity ? null : probeStartTs)
            };
        }

        // ── 共用：左侧批次/代理面板（通道视图与请求分析共用）───────────────────────────────────

                } else {
                    // 请求分析视图：多选 checkbox 并集（用于合并分析）
                    proxyListHtml = `

        function renderTimelineTicks(timeRange) {
            const { min, max, span } = timeRange;
            if (!isFinite(span) || span <= 0) return '';

            const getPos = (ts) => ((ts - min) / span) * 100;

            // 收集所有刻度
            const tickMap = new Map(); // ts -> tick对象，避免重复

            // 添加开始时间
            tickMap.set(min, { ts: min, type: 'start' });

            // 从第一个整秒开始，逐秒遍历到结束
            const firstSec = Math.ceil(min / 1000) * 1000;
            for (let ts = firstSec; ts <= max; ts += 1000) {
                const d = new Date(ts);
                const sec = d.getSeconds();
                const isRelease = d.getHours() === 15 && d.getMinutes() === 0 && sec === 0;

                if (sec === 0) {
                    tickMap.set(ts, { ts, type: isRelease ? 'release' : 'minute' });
                } else if (sec === 30) {
                    tickMap.set(ts, { ts, type: 'half' });
                } else if (sec !== 0 && sec !== 30) {
                    tickMap.set(ts, { ts, type: 'second', label: String(sec) });
                }
            }

            // 开始时间若恰好是整点/半分/放票，升级其类型而非重复
            const startTick = tickMap.get(min);
            if (startTick?.type === 'start') {
                const d = new Date(min);
                const sec = d.getSeconds();
                const isRelease = d.getHours() === 15 && d.getMinutes() === 0 && sec === 0;
                if (isRelease)      startTick.type = 'release';
                else if (sec === 0) startTick.type = 'minute';
                else if (sec === 30) startTick.type = 'half';
            }

            const ticks = [...tickMap.values()].sort((a, b) => a.ts - b.ts);
            let html = '';

            ticks.forEach((tick, i) => {
                const pos = getPos(tick.ts);
                if (pos < 0 || pos > 100.01) return;

                // 第一个刻度靠左对齐，避免被遮挡
                const transform = (i === 0) ? 'translateX(0)' : 'translateX(-50%)';

                let lineClass, labelHtml;
                switch (tick.type) {
                    case 'release':
                        lineClass = 'release';
                        labelHtml = `<span class="tick-label lbl-release">⚡ ${formatTime(tick.ts)}</span>`;
                        break;
                    case 'minute':
                    case 'start':
                        lineClass = 'major';
                        labelHtml = `<span class="tick-label lbl-minute">${formatTime(tick.ts)}</span>`;
                        break;
                    case 'half':
                        lineClass = 'half';
                        labelHtml = `<span class="tick-label lbl-half">${formatTime(tick.ts)}</span>`;
                        break;
                    case 'second':
                        lineClass = 'second';
                        labelHtml = `<span class="tick-label lbl-second">${tick.label}</span>`;
                        break;
                    default:
                        lineClass = 'minor';
                        labelHtml = '';
                }

                html += `<div class="ruler-tick" style="left:${pos}%;transform:${transform}">
                    <div class="tick-line ${lineClass}"></div>
                    ${labelHtml}
                </div>`;
            });

            return html;
        }
        
        // 按目标服务器过滤 proxyData 和 pd（供所有 render 函数使用）
        function applyTargetFilter(proxyData, pd) {
            if (!state.selectedTargetHost) return { proxyData, pd };
            const th = state.selectedTargetHost;
            const filteredChannels = proxyData.channels.filter(c => c.targetHost === th);
            const channelIdSet = new Set(filteredChannels.map(c => c.id));
            const filteredHbMap = {};
            Object.entries(pd.heartbeatMap).forEach(([cid, v]) => { if (channelIdSet.has(cid)) filteredHbMap[cid] = v; });
            const filteredCheckMap = {};
            Object.entries(pd.checkMap).forEach(([cid, v]) => { if (channelIdSet.has(cid)) filteredCheckMap[cid] = v; });
            const filteredLockMap = {};
            Object.entries(pd.lockMap).forEach(([cid, v]) => { if (channelIdSet.has(cid)) filteredLockMap[cid] = v; });
            return {
                proxyData: { ...proxyData, channels: filteredChannels },
                pd: { ...pd, heartbeatMap: filteredHbMap, checkMap: filteredCheckMap, lockMap: filteredLockMap }
            };
        }

        function renderChannels(proxyData, pd) {
            const { timeRange, heartbeatMap, checkMap, lockMap } = pd;

            const getPos = (ts) => {
                if (!ts || !isFinite(timeRange.span) || timeRange.span <= 0) return 0;
                return ((ts - timeRange.min) / timeRange.span) * 100;
            };

            // 显示全部通道（成功 + 失败 + 探活）
            const allChannels = proxyData.channels
                .sort((a, b) => (a.startTs || 0) - (b.startTs || 0));

            if (allChannels.length === 0) {
                return `<div class="no-data">该代理没有任何通道记录</div>`;
            }

            return allChannels.map(ch => {
                const heartbeats = heartbeatMap[ch.id] || [];
                const checks = checkMap[ch.id] || [];
                const locks = lockMap[ch.id] || [];
                const channelNum = ch.id.split('-').slice(-1)[0];
                let bars = '', dots = '';

                if (ch.status === 'failed') {
                    // 失败通道（含探活RST）：只画失败条
                    if (ch.startTs && ch.connectEndTs) {
                        const startPos = getPos(ch.startTs);
                        const endPos = getPos(ch.connectEndTs);
                        const barClass = ch.isProbeTest ? 'probe-failed' : 'failed';
                        const tipLabel = ch.isProbeTest ? '探活RST' : '连接失败';
                        bars += `<div class="channel-bar ${barClass}" style="left:${startPos}%;width:${Math.max(0.2, endPos - startPos)}%" data-tip="${tipLabel}\n开始: ${formatTime(ch.startTs)}\n结束: ${formatTime(ch.connectEndTs)}\n耗时: ${formatDuration(ch.connectDuration)}${ch.errorMessage ? '\n' + ch.errorMessage.substring(0, 60) : ''}"></div>`;
                    }
                } else {
                    // 成功/关闭通道：原有绘制逻辑
                    if (ch.startTs && ch.connectEndTs) {
                        const connectStartPos = getPos(ch.startTs);
                        const connectEndPos = getPos(ch.connectEndTs);
                        bars += `<div class="channel-bar connecting" style="left:${connectStartPos}%;width:${Math.max(0.2, connectEndPos - connectStartPos)}%" data-tip="连接阶段\n请求开始: ${formatTime(ch.startTs)}\n建立成功: ${formatTime(ch.connectEndTs)}\n连接耗时: ${formatDuration(ch.connectDuration)}"></div>`;

                        if (ch.closeTs) {
                            const workDuration = ch.closeTs - ch.connectEndTs;
                            const closePos = getPos(ch.closeTs);
                            bars += `<div class="channel-bar working" style="left:${connectEndPos}%;width:${Math.max(0.2, closePos - connectEndPos)}%" data-tip="工作阶段\n开始: ${formatTime(ch.connectEndTs)}\n结束: ${formatTime(ch.closeTs)}\n工作时长: ${formatDuration(workDuration)}"></div>`;
                        }
                    }

                    // 耗时横条辅助（方案三：从事件点向右延伸，宽度=耗时在时间轴上的比例）
                    const durBar = (pos, duration, color) => {
                        if (!duration || duration <= 0 || !isFinite(timeRange.span) || timeRange.span <= 0) return '';
                        const w = (duration / timeRange.span * 100).toFixed(4);
                        return `<div style="position:absolute;left:${pos}%;top:calc(50% + 4px);height:3px;width:${w}%;background:${color};opacity:0.6;border-radius:0 2px 2px 0;pointer-events:none;"></div>`;
                    };

                    // 心跳
                    heartbeats.forEach(hb => {
                        if (!hb.ts) return;
                        const pos = getPos(hb.ts);
                        const durColor = hb.success ? '#22d3ee' : '#f87171';
                        dots += `<div class="event-dot heartbeat ${hb.success?'heartbeat-success':'heartbeat-fail'}" style="left:${pos}%" data-tip="心跳 ${hb.success?'✓':'✗'}\n时间: ${formatTime(hb.ts)}\n状态码: ${hb.statusCode||'N/A'}\n耗时: ${hb.duration!=null?hb.duration+'ms':'N/A'}${hb.error?'\n'+hb.error:''}"></div>`;
                        dots += durBar(pos, hb.duration, durColor);
                    });

                    // 查号
                    checks.forEach(ck => {
                        if (!ck.ts) return;
                        const pos = getPos(ck.ts);
                        const durColor = ck.statusCode === 200 ? '#4ade80' : '#fbbf24';
                        dots += `<div class="event-dot ${ck.statusCode===200?'check':'check-error'}" style="left:${pos}%" data-tip="查号请求\n时间: ${formatTime(ck.ts)}\n状态码: ${ck.statusCode}\n耗时: ${ck.duration!=null?ck.duration+'ms':'N/A'}\n${ck.error||'成功'}"></div>`;
                        dots += durBar(pos, ck.duration, durColor);
                    });

                    // 锁号
                    locks.forEach(lk => {
                        if (!lk.ts) return;
                        const pos = getPos(lk.ts);
                        const durColor = lk.success ? '#a855f7' : '#f87171';
                        dots += `<div class="event-dot ${lk.success?'lock':'lock-fail'}" style="left:${pos}%" data-tip="锁号请求 ${lk.success?'✓':'✗'}\n时间: ${formatTime(lk.ts)}\n耗时: ${lk.duration!=null?lk.duration+'ms':'N/A'}\n${lk.error||'成功'}"></div>`;
                        dots += durBar(pos, lk.duration, durColor);
                    });

                    // 关闭
                    if (ch.closeTs) {
                        const pos = getPos(ch.closeTs);
                        dots += `<div class="event-dot close" style="left:${pos}%" data-tip="通道关闭\n时间: ${formatTime(ch.closeTs)}"></div>`;
                    }
                }

                const rowClass = ch.isProbeTest ? 'probe-channel-row' : '';
                const labelClass = ch.status === 'failed' ? 'style="color:#f87171;"' : '';
                const labelPrefix = ch.isProbeTest ? '探' : (ch.status === 'failed' ? '✗' : '');
                return `<div class="channel-row ${rowClass}">
                    <div class="channel-label" title="${ch.id}${ch.isProbeTest ? '\n探活RST' : ''}" ${labelClass}>${labelPrefix}#${channelNum}</div>
                    <div class="channel-timeline">${bars}${dots}</div>
                </div>`;
            }).join('');
        }

        function renderAliveChart(proxyData, pd) {
            if (!proxyData) return '';
            const { timeRange } = pd;
            const { min, max, span } = timeRange;
            if (!isFinite(span) || span <= 0) return '';

            const connectedChannels = proxyData.channels.filter(ch => ch.status === 'connected' && ch.connectEndTs);

            const noData = `<div class="channel-row alive-chart-row">
                <div class="alive-chart-label"><span>-</span><span class="alive-chart-title">存活</span><span>0</span></div>
                <div class="alive-chart-timeline" style="display:flex;align-items:center;padding-left:8px;">
                    <span style="color:#64748b;font-size:11px;">无存活数据</span>
                </div>
            </div>`;

            if (connectedChannels.length === 0) return noData;

            // 构建 +1/-1 事件列表
            const events = [];
            connectedChannels.forEach(ch => {
                events.push({ ts: ch.connectEndTs, delta: 1 });
                if (ch.closeTs) events.push({ ts: ch.closeTs, delta: -1 });
            });
            events.sort((a, b) => a.ts - b.ts);

            // 构建阶梯序列
            const series = [{ ts: min, count: 0 }];
            let count = 0;
            for (const ev of events) {
                if (ev.ts < min || ev.ts > max) continue;
                count = Math.max(0, count + ev.delta);
                series.push({ ts: ev.ts, count });
            }
            if (series[series.length - 1].ts < max) {
                series.push({ ts: max, count: series[series.length - 1].count });
            }

            const maxCount = Math.max(...series.map(s => s.count), 1);
            const W = 10000, H = 80, padT = 8, padB = 8;
            const chartH = H - padT - padB;
            const toX = ts => ((ts - min) / span * W).toFixed(1);
            const toY = c  => (padT + (1 - c / maxCount) * chartH).toFixed(1);

            // 面积多边形（阶梯）
            let areaPts = `${toX(series[0].ts)},${H} ${toX(series[0].ts)},${toY(series[0].count)}`;
            for (let i = 1; i < series.length; i++) {
                areaPts += ` ${toX(series[i].ts)},${toY(series[i-1].count)} ${toX(series[i].ts)},${toY(series[i].count)}`;
            }
            areaPts += ` ${toX(series[series.length-1].ts)},${H}`;

            // 描边折线（阶梯）
            let linePts = `${toX(series[0].ts)},${toY(series[0].count)}`;
            for (let i = 1; i < series.length; i++) {
                linePts += ` ${toX(series[i].ts)},${toY(series[i-1].count)} ${toX(series[i].ts)},${toY(series[i].count)}`;
            }

            // 15:00:00 竖线
            let releaseLine = '';
            const relTs = new Date(min);
            relTs.setHours(15, 0, 0, 0);
            const relTsMs = relTs.getTime();
            if (relTsMs > min && relTsMs < max) {
                const rx = toX(relTsMs);
                releaseLine = `<line x1="${rx}" y1="0" x2="${rx}" y2="${H}" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.8" vector-effect="non-scaling-stroke"/>`;
            }

            // 水平网格线
            let gridLines = '';
            [0, 0.25, 0.5, 0.75, 1].forEach(f => {
                const y = (padT + (1 - f) * chartH).toFixed(1);
                gridLines += `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="#1e293b" stroke-width="1" vector-effect="non-scaling-stroke"/>`;
            });

            // 峰值数字标注
            const peakStep = series.find(s => s.count === maxCount);
            let peakLabel = '';
            if (peakStep) {
                const px = toX(peakStep.ts);
                const py = (parseFloat(toY(maxCount)) - 3).toFixed(1);
                peakLabel = `<text x="${px}" y="${py}" fill="#4ade80" font-size="120" font-family="monospace" text-anchor="middle" vector-effect="non-scaling-stroke">${maxCount}</text>`;
            }

            // 首次探活时间标记
            const probeChannels = proxyData.channels.filter(c => c.isProbeTest && c.startTs);
            const probeFirstTs = probeChannels.length > 0
                ? Math.min(...probeChannels.map(c => c.startTs))
                : null;
            let probeLine = '';
            if (probeFirstTs && probeFirstTs >= min && probeFirstTs <= max) {
                const px = toX(probeFirstTs);
                const fmtP = ts => { const d = new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); };
                probeLine = `<line x1="${px}" y1="0" x2="${px}" y2="${H}" stroke="#fb923c" stroke-width="2" stroke-dasharray="200,100" stroke-opacity="0.9" vector-effect="non-scaling-stroke"/>
                    <text x="${parseFloat(px)+80}" y="${(padT+130).toFixed(1)}" fill="#fb923c" font-size="110" font-family="monospace" vector-effect="non-scaling-stroke">探活 ${fmtP(probeFirstTs)}</text>`;
            }

            const svg = `<svg width="100%" height="80" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;">
                <defs>
                    <linearGradient id="aliveGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#22c55e" stop-opacity="0.5"/>
                        <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
                    </linearGradient>
                </defs>
                ${gridLines}
                ${releaseLine}
                ${probeLine}
                <polygon points="${areaPts}" fill="url(#aliveGrad)"/>
                <polyline points="${linePts}" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linejoin="miter" vector-effect="non-scaling-stroke"/>
                ${peakLabel}
            </svg>`;

            return `<div class="channel-row alive-chart-row">
                <div class="alive-chart-label">
                    <span>${maxCount}</span>
                    <span class="alive-chart-title">存活</span>
                    <span>0</span>
                </div>
                <div class="alive-chart-timeline">${svg}</div>
            </div>`;
        }

        // 合并汇总行：心跳+查票+锁号合并为一行
        function renderSummaryRow(proxyData, pd) {

                dots += durBar(pos, hb.duration, durColor);

            allCk.forEach(ck => {
