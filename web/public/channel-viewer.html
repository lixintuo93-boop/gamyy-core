        // 耗时走势图（当前代理 / 当前批次 切换）
        // 辅助：SVG 坐标点数组 → Catmull-Rom 平滑贝塞尔路径字符串
        // 使用 Catmull-Rom → 三阶贝塞尔转换，让折线变平滑曲线
        function buildSmoothPath(pts) {
            if (!pts || pts.length < 2) return '';
            if (pts.length === 2) {
                return `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)} L${pts[1].x.toFixed(1)},${pts[1].y.toFixed(1)}`;
            }
            let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
            for (let i = 1; i < pts.length; i++) {
                const p0 = pts[Math.max(0, i - 2)];
                const p1 = pts[i - 1];
                const p2 = pts[i];
                const p3 = pts[Math.min(pts.length - 1, i + 1)];
                // Catmull-Rom 控制点：CP1 = P1 + (P2-P0)/6，CP2 = P2 - (P3-P1)/6
                const cp1x = p1.x + (p2.x - p0.x) / 6;
                const cp1y = p1.y + (p2.y - p0.y) / 6;
                const cp2x = p2.x - (p3.x - p1.x) / 6;
                const cp2y = p2.y - (p3.y - p1.y) / 6;
                d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
            }
            return d;
        }

        // 检测网络波动起始点（服务器开始承压的时刻）
        // 多信号融合：取以下信号中最早触发的时刻
        //   信号1 - 耗时突增：滑动窗口P75 首次持续超过5倍基准耗时
        //   信号2 - 心跳失败率：滑动窗口失败率首次持续超过10%（30s窗口，5s步长）
        function detectInflectionTs(slidePts, allHbs) {
            // 信号1：耗时突增检测
            let latencyInflTs = null;
            if (slidePts && slidePts.length >= 5) {
                let minIdx = 0;
                slidePts.forEach((p, i) => { if (p.dur < slidePts[minIdx].dur) minIdx = i; });
                const baseline = slidePts[minIdx].dur;
                const threshold = Math.max(baseline * 5, 1000);
                for (let i = minIdx + 1; i < slidePts.length - 1; i++) {
                    if (slidePts[i].dur >= threshold && slidePts[i + 1].dur >= threshold * 0.5) {
                        latencyInflTs = slidePts[i].ts;
                        break;
                    }
                }
            }
            // 信号2：心跳失败率突增检测（含失败心跳，30s滑动窗口，5s步长）
            // 条件：当前窗口失败率≥10%，且下一窗口失败率也≥5%（持续性确认）
            let failureInflTs = null;
            if (allHbs && allHbs.length >= 10) {
                const hbs = allHbs.filter(hb => hb.ts != null).sort((a, b) => a.ts - b.ts);
                if (hbs.length >= 10) {
                    const tMin = hbs[0].ts, tMax = hbs[hbs.length - 1].ts;
                    for (let t = tMin; t <= tMax - 5000; t += 5000) {
                        const win = hbs.filter(hb => hb.ts >= t - 15000 && hb.ts <= t + 15000);
                        if (win.length < 5) continue;
                        const failRate = win.filter(hb => hb.success === false).length / win.length;
                        if (failRate >= 0.1) {
                            // 持续性确认：下一步窗口失败率也≥5%
                            const nxt = hbs.filter(hb => hb.ts >= t - 10000 && hb.ts <= t + 20000);
                            if (nxt.length >= 5 && nxt.filter(hb => hb.success === false).length / nxt.length >= 0.05) {
                                failureInflTs = t;
                                break;
                            }
                        }
                    }
                }
            }
            // 取最早触发的信号
            const candidates = [latencyInflTs, failureInflTs].filter(t => t !== null);
            return candidates.length > 0 ? Math.min(...candidates) : null;
        }

        function renderDurationChart(proxyData, pd) {
            if (!proxyData) return '';
            state._currentProxyData = proxyData; // 存储供拖动时 DOM 更新使用
            const { timeRange } = pd;
            const { min, max, span } = timeRange;
            if (!isFinite(span) || span <= 0) return '';

            const mode = state.durationMode || 'proxy';
            const maxDur = 60000; // Y轴固定60s
            const H = 100;        // 图表高度(px)
            const padT = 5, padB = 3;
            const chartH = H - padT - padB;
            const W = 10000;      // SVG viewBox 宽度

            // 按模式取数据
            let heartbeats, checks, locks;
            if (mode === 'batch') {
                heartbeats = pd.allHeartbeats    || [];
                checks     = pd.allCheckRequests || [];
                locks      = pd.allLockRequests  || [];
            } else {
                const { heartbeatMap, checkMap, lockMap } = pd;
                heartbeats = proxyData.channels.flatMap(ch => heartbeatMap[ch.id] || []);
                checks     = proxyData.channels.flatMap(ch => checkMap[ch.id]     || []);
                locks      = proxyData.channels.flatMap(ch => lockMap[ch.id]      || []);
            }

            // 坐标映射
            const svgX  = ts => (ts - min) / span * W;
            const svgY  = d  => padT + (1 - Math.min(Math.max(d || 0, 0), maxDur) / maxDur) * chartH;
            const cssXP = ts => (((ts - min) / span) * 100).toFixed(3);
            const cssYP = d  => (svgY(d) / H * 100).toFixed(2);

            // SVG 网格线
            let gridLines = '';
            [0, 15000, 30000, 45000, 60000].forEach(d => {
                const y = svgY(d).toFixed(1);
                const col = (d === 0 || d === 60000) ? '#2d3748' : '#1a2433';
                gridLines += `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${col}" stroke-width="1" vector-effect="non-scaling-stroke"/>`;
            });

            // 15:00:00 黄色竖线
            const relTs = new Date(min); relTs.setHours(15, 0, 0, 0);
            const relTsMs = relTs.getTime();
            let relLine = '';
            if (relTsMs > min && relTsMs <= max) {
                const rx = svgX(relTsMs).toFixed(1);
                relLine = `<line x1="${rx}" y1="0" x2="${rx}" y2="${H}" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.7" vector-effect="non-scaling-stroke"/>`;
            }

            // 首次探活时间标记（橙色竖线，与存活图对应）
            const _probeChsDur = proxyData.channels.filter(c => c.isProbeTest && c.startTs);
            const _probeFirstTsDur = _probeChsDur.length > 0 ? Math.min(..._probeChsDur.map(c => c.startTs)) : null;
            let probeLineDur = '';
            let probeMarkerHtmlDur = '';
            if (_probeFirstTsDur && _probeFirstTsDur >= min && _probeFirstTsDur <= max) {
                const px = svgX(_probeFirstTsDur).toFixed(1);
                const fmtP = ts => { const d = new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); };
                probeLineDur = `<line x1="${px}" y1="0" x2="${px}" y2="${H}" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.85" vector-effect="non-scaling-stroke"/>`;
                const pxPct = cssXP(_probeFirstTsDur);
                probeMarkerHtmlDur = `<div style="position:absolute;left:${pxPct}%;top:0;height:100%;width:0;border-left:2px dashed #fb923c;transform:translateX(-50%);pointer-events:none;z-index:5;opacity:0.85;">
                    <div style="position:absolute;top:2px;left:4px;white-space:nowrap;background:rgba(10,16,30,0.85);padding:1px 5px;border-radius:3px;border:1px solid rgba(251,146,60,0.35);">
                        <span style="font-size:9px;color:#fb923c;font-family:monospace;font-weight:600;">探活 ${fmtP(_probeFirstTsDur)}</span>
                    </div>
                </div>`;
            }

            // ── 趋势曲线：成功心跳按30s分桶取P50 ──
            const bucketMs = 30000;
            const validHbs = heartbeats.filter(hb => hb.ts && hb.duration != null && hb.duration > 0 && hb.success !== false);
            const bucketMap = {};
            validHbs.forEach(hb => {
                const b = Math.floor((hb.ts - min) / bucketMs);
                if (!bucketMap[b]) bucketMap[b] = [];
                bucketMap[b].push(hb.duration);
            });
            const allTrendPts = Object.entries(bucketMap)
                .map(([b, durs]) => {
                    const sorted = [...durs].sort((a, c) => a - c);
                    // P75：比 P50 更能代表散点视觉中心，避免曲线偏低
                    const p75 = sorted[Math.min(Math.floor(sorted.length * 0.75), sorted.length - 1)];
                    return { ts: min + (parseInt(b) + 0.5) * bucketMs, dur: Math.min(p75, maxDur) };
                })
                .sort((a, b) => a.ts - b.ts)
                .filter(p => p.ts >= min && p.ts <= max);

            // ── 预测用滑动窗口（30s/5s，样本充分，供回归使用）──
            // 缓存到 state._slidePts 供拖动事件复用，避免重复计算
            let slidePts = [];
            let inflectionTs = null;
            let inflectionMarkerSvg = '';
            let inflectionMarkerHtml = '';
            let inflectionHeaderTag = '';
            let realCurveSvg = '';

            if (validHbs.length >= 2) {
                const slideEnd = Math.min(relTsMs, max);

                // 1. 预测用滑动窗口（30s/5s）
                for (let t = min; t <= slideEnd; t += 5000) {
                    const winDurs = validHbs
                        .filter(hb => hb.ts >= t - 15000 && hb.ts <= t + 15000)
                        .map(hb => hb.duration);
                    if (winDurs.length < 2) continue;
                    const s = [...winDurs].sort((a, b) => a - b);
                    slidePts.push({ ts: t, dur: Math.min(s[Math.min(Math.floor(s.length * 0.75), s.length - 1)], maxDur) });
                }

                // 2. 检测波动起始点
                inflectionTs = detectInflectionTs(slidePts, heartbeats);

                // 3. 波动起始点标记（橙色竖线 + HTML标签）
                if (inflectionTs !== null && inflectionTs >= min && inflectionTs <= max) {
                    const ix = svgX(inflectionTs).toFixed(1);
                    inflectionMarkerSvg = `<line x1="${ix}" y1="0" x2="${ix}" y2="${H}" stroke="#f97316" stroke-width="2" stroke-dasharray="5,3" opacity="0.7" vector-effect="non-scaling-stroke"/>`;
                    const fmtInfl = ts => { const d = new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); };
                    const inflXPct = cssXP(inflectionTs);
                    inflectionMarkerHtml = `<div style="position:absolute;left:${inflXPct}%;top:0;height:100%;width:0;border-left:2px dashed #f97316;transform:translateX(-50%);pointer-events:none;z-index:5;opacity:0.75;">
                        <div style="position:absolute;top:2px;left:4px;white-space:nowrap;background:rgba(10,16,30,0.85);padding:1px 5px;border-radius:3px;border:1px solid rgba(249,115,22,0.35);">
                            <span style="font-size:9px;color:#f97316;font-family:monospace;font-weight:600;">↗ ${fmtInfl(inflectionTs)}</span>
                        </div>
                    </div>`;
                    inflectionHeaderTag = `<span style="margin-left:8px;font-size:10px;color:#f97316;font-family:monospace;white-space:nowrap;">↗ 波动起始: ${fmtInfl(inflectionTs)}</span>`;
                }

                // 4. 视觉趋势曲线（30s滑动窗口 + 最小递增步选点，平滑上升）
                // 算法：每2s时间步，从30s窗口内所有原始心跳耗时中，找"刚好大于上一个
                //       选中值的最小值"，形成"最缓坡度递增序列"。
                // 对比 running max on P75：running max 一旦触及峰值就永远停留在高位（曲线
                // 变平线）；本算法只迈"最小可能的一步"，曲线真正贴着数据下沿缓步上升。
                // 若窗口内所有值都 ≤ prevDur（瞬时回落）→ 维持当前值（平台期，不下降）。
                const trendStart = inflectionTs !== null ? inflectionTs : min;
                const trendPts = [];
                let prevDur = 0;

                for (let t = trendStart; t <= slideEnd; t += 2000) {
                    const winDurs = validHbs
                        .filter(hb => hb.ts >= t - 15000 && hb.ts <= t + 15000)
                        .map(hb => hb.duration);
                    if (winDurs.length < 1) continue;
                    const sorted = [...winDurs].sort((a, b) => a - b);
                    // 找最小的"比 prevDur 更大"的原始耗时（最缓的一步上升）
                    const above = sorted.filter(d => d > prevDur);
                    if (above.length > 0) {
                        prevDur = Math.min(above[0], maxDur);
                    }
                    trendPts.push({ ts: t, dur: Math.min(prevDur, maxDur) });
                }
                if (trendPts.length >= 2) {
                    const svgPts = trendPts.map(p => ({ x: svgX(p.ts), y: svgY(p.dur) }));
                    realCurveSvg = `<path id="durationRealCurve" d="${buildSmoothPath(svgPts)}" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" opacity="0.9"/>`;
                }
            }
            state._slidePts = slidePts; // 缓存供拖动事件复用

            // ── 游标时间初始化 ──
            let cursorTs = state.durationCursorTime;
            if (!cursorTs || cursorTs < min || cursorTs > max) {
                // 默认放在15:00前2分钟处
                cursorTs = relTsMs > min ? Math.max(min, relTsMs - 120000) : Math.round(min + span * 0.7);
                state.durationCursorTime = Math.round(cursorTs);
            }
            const cursorXPct = cssXP(cursorTs);

            // ── 预测曲线（用滑动窗口值做回归，数据密度远高于30s桶）──
            const predResult = computeDurationPrediction(slidePts.length >= 2 ? slidePts : allTrendPts, cursorTs, relTsMs, min, span, maxDur, W, H, padT, chartH);
            let predCurveSvg = `<path id="durationPredCurve" d="${predResult ? predResult.svgPath : ''}" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,3" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" opacity="0.85"/>`;

            let recMarkerHtml = `<div id="durationRecMarker" style="display:none;position:absolute;top:0;height:100%;pointer-events:none;z-index:6;"></div>`;
            let recHeaderTag = `<span id="durationRecLabel" style="margin-left:10px;font-size:10px;color:#64748b;font-family:monospace;white-space:nowrap;">拖动游标查看预测</span>`;
            if (predResult && predResult.inRange) {
                recMarkerHtml = `<div id="durationRecMarker" style="position:absolute;left:${predResult.recXPct}%;top:0;height:100%;width:0;border-left:2px dashed #a855f7;transform:translateX(-50%);pointer-events:none;z-index:6;">
                    <div style="position:absolute;top:3px;left:5px;white-space:nowrap;background:rgba(10,16,30,0.88);padding:2px 6px;border-radius:3px;border:1px solid rgba(168,85,247,0.4);">
                        <div style="font-size:10px;color:#a855f7;font-family:monospace;font-weight:600;">📍 预测查票: ${predResult.recTimeStr}</div>
                        <div style="font-size:9px;color:#64748b;margin-top:1px;">预测耗时=${predResult.durStr} · n=${predResult.n}</div>
                    </div>
                </div>`;
                recHeaderTag = `<span id="durationRecLabel" style="margin-left:10px;font-size:10px;color:#a855f7;font-family:monospace;font-weight:600;white-space:nowrap;">📍 预测查票: ${predResult.recTimeStr} <span style="color:#475569;font-weight:400;">(预测耗时=${predResult.durStr})</span></span>`;
            }

            // ── 散点 HTML ──
            const makeDots = (items, colorFn, sizePx, tipFn) => items.map(item => {
                if (!item.ts || item.duration == null) return '';
                const x = cssXP(item.ts), y = cssYP(item.duration);
                const tip = tipFn(item).replace(/"/g, '&quot;');
                return `<div style="position:absolute;left:${x}%;top:${y}%;width:${sizePx}px;height:${sizePx}px;border-radius:50%;background:${colorFn(item)};transform:translate(-50%,-50%);opacity:0.75;" data-tip="${tip}"></div>`;
            }).join('');

            const hbDots = makeDots(heartbeats,
                hb => hb.success !== false ? '#3b82f6' : '#ef4444', 5,
                hb => `心跳 ${hb.success !== false ? '✓' : '✗'}\n时间: ${formatTime(hb.ts)}\n耗时: ${formatDuration(hb.duration)}\n状态码: ${hb.statusCode || 'N/A'}`
            );
            const ckDots = makeDots(checks,
                ck => ck.statusCode === 200 ? '#eab308' : '#f97316', 6,
                ck => `查票\n时间: ${formatTime(ck.ts)}\n耗时: ${formatDuration(ck.duration)}\n状态码: ${ck.statusCode}`
            );
            const lkDots = makeDots(locks,
                lk => lk.success !== false ? '#a855f7' : '#dc2626', 7,
                lk => `锁号 ${lk.success !== false ? '✓' : '✗'}\n时间: ${formatTime(lk.ts)}\n耗时: ${formatDuration(lk.duration)}`
            );

            const hasDur = heartbeats.some(h => h.duration != null) || checks.some(c => c.duration != null) || locks.some(l => l.duration != null);
            const noDataMsg = !hasDur
                ? `<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#64748b;font-size:11px;">暂无耗时数据（DB 需含 duration 字段）</span>`
                : '';

            // ── 拖动游标 HTML ──
            const cursorHtml = `<div id="durationCursor" style="position:absolute;left:${cursorXPct}%;top:0;height:100%;width:14px;transform:translateX(-50%);cursor:ew-resize;z-index:10;user-select:none;">
                <div style="position:absolute;left:50%;top:0;height:100%;width:0;border-left:2px solid #c084fc;transform:translateX(-50%);pointer-events:none;"></div>
                <div style="position:absolute;left:50%;top:50%;width:10px;height:18px;transform:translate(-50%,-50%);background:rgba(192,132,252,0.25);border:1px solid #c084fc;border-radius:3px;pointer-events:none;"></div>
            </div>`;

            return `
                <div class="duration-chart-header">
                    <div style="width:60px;flex-shrink:0;"></div>
                    <button class="toggle-btn ${mode==='proxy'?'active':''}" id="durationModeProxy">当前代理</button>
                    <button class="toggle-btn ${mode==='batch'?'active':''}" id="durationModeBatch">当前批次</button>
                    <span style="font-size:10px;color:#475569;margin-left:6px;">
                        <span style="color:#3b82f6">●心跳</span>&nbsp;
                        <span style="color:#eab308">●查票</span>&nbsp;
                        <span style="color:#a855f7">●锁号</span>&nbsp;
                        <span style="color:#fb923c">┆探活</span>&nbsp;
                        <span style="color:#f97316">┆波动</span>&nbsp;
                        <span style="color:#22d3ee">— 趋势</span>&nbsp;
                        <span style="color:#a855f7">╌ 预测</span>&nbsp;
                        <span style="color:#c084fc">│游标</span>
                    </span>
                    ${inflectionHeaderTag}
                    ${recHeaderTag}
                </div>
                <div class="duration-chart-section" id="durationChartWrapper">
                    <div class="heartbeat-summary-container" style="width: ${100 * state.zoomLevel}%">
                        <div class="channel-row duration-chart-row">
                            <div class="duration-chart-label">
                                <span>60s</span>
                                <span>30s</span>
                                <span>0</span>
                            </div>
                            <div class="duration-chart-timeline">
                                ${noDataMsg}
                                <svg style="position:absolute;top:0;left:0;width:100%;height:${H}px;pointer-events:none;" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${gridLines}${relLine}${probeLineDur}${inflectionMarkerSvg}${realCurveSvg}${predCurveSvg}</svg>
                                ${hbDots}${ckDots}${lkDots}
                                ${probeMarkerHtmlDur}
                                ${inflectionMarkerHtml}
                                ${recMarkerHtml}
                                ${cursorHtml}
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        // ── 预测计算：加权线性回归 ──
        // allTrendPts: 全量趋势点（30s桶P75）
        // cursorTs: 游标时间戳（ms），只用游标左侧数据预测
        // relTsMs: 15:00:00 时间戳
        function computeDurationPrediction(allTrendPts, cursorTs, relTsMs, min, span, maxDur, W, H, padT, chartH) {
            const beforeCursor = allTrendPts.filter(p => p.ts <= cursorTs);
            if (beforeCursor.length < 2) return null;

            // ─── 第一步：过滤预热期（剔除服务器未加载时的平稳低耗时桶）───
            // 阈值 = max(当前窗口最大P75的10%, 1000ms)
            // 低于阈值的桶视为"预热期"，不参与回归，避免污染冲量期拟合
            const maxP75 = Math.max(...beforeCursor.map(p => p.dur));
            const rushThreshold = Math.max(maxP75 * 0.1, 1000);
            let regPts = beforeCursor.filter(p => p.dur >= rushThreshold);
            if (regPts.length < 2) {
                // 冲量期数据不足时：取最后一个预热期桶作为"坡度锚点"
                // 搭配仅有的冲量期点做线性外推，比回退到全部数据更准确
                // 原因：回退到全部数据会引入多个预热期低值，拉平斜率，导致预测曲线过缓
                const preRushPts = beforeCursor.filter(p => p.dur < rushThreshold);
                const anchor = preRushPts.length > 0 ? [preRushPts[preRushPts.length - 1]] : [];
                regPts = [...anchor, ...regPts];
                if (regPts.length < 2) regPts = beforeCursor; // 终极回退
            }

            // 取最近6个回归点（越新越重要）
            const last6 = regPts.slice(-6);
            if (last6.length < 2) return null;

            const baseWeights = [1, 1.5, 2, 2.5, 3, 4];
            const weights = baseWeights.slice(6 - last6.length);

            // x 以窗口第一个点为原点（秒），避免大数值精度问题
            const x0 = last6[0].ts;
            const toX = ts => (ts - x0) / 1000;

            let predict = null;

            if (last6.length >= 3) {
                // 加权二次回归：y = a·x² + b·x + c（捕获耗时加速上升的曲率）
                let s0=0,s1=0,s2=0,s3=0,s4=0, t0=0,t1=0,t2=0;
                last6.forEach((p, i) => {
                    const w = weights[i], x = toX(p.ts), y = p.dur;
                    s0+=w; s1+=w*x; s2+=w*x*x; s3+=w*x*x*x; s4+=w*x*x*x*x;
                    t0+=w*y; t1+=w*x*y; t2+=w*x*x*y;
                });
                const M = [
                    [s0, s1, s2, t0],
                    [s1, s2, s3, t1],
                    [s2, s3, s4, t2]
                ];
                let ok = true;
                for (let col = 0; col < 3; col++) {
                    let maxRow = col;
                    for (let r = col+1; r < 3; r++) {
                        if (Math.abs(M[r][col]) > Math.abs(M[maxRow][col])) maxRow = r;
                    }
                    [M[col], M[maxRow]] = [M[maxRow], M[col]];
                    if (Math.abs(M[col][col]) < 1e-8) { ok = false; break; }
                    for (let r = col+1; r < 3; r++) {
                        const f = M[r][col] / M[col][col];
                        for (let k = col; k <= 3; k++) M[r][k] -= f * M[col][k];
                    }
                }
                if (ok) {
                    const sol = [0, 0, 0];
                    for (let i = 2; i >= 0; i--) {
                        sol[i] = M[i][3];
                        for (let j = i+1; j < 3; j++) sol[i] -= M[i][j] * sol[j];
                        sol[i] /= M[i][i];
                    }
                    const [c, b, a] = sol;
                    predict = ts => {
                        const x = toX(ts);
                        return Math.max(0, Math.min(maxDur, a*x*x + b*x + c));
                    };
                }
            }

            if (!predict) {
                // 回退：加权线性回归（点数不足3或二次求解奇异时）
                let s0=0,s1=0,s2=0, t0=0,t1=0;
                last6.forEach((p, i) => {
                    const w = weights[i], x = toX(p.ts);
                    s0+=w; s1+=w*x; s2+=w*x*x; t0+=w*p.dur; t1+=w*x*p.dur;
                });
                const det = s0*s2 - s1*s1;
                if (Math.abs(det) < 1e-6) return null;
                const slope = (s0*t1 - s1*t0) / det;
                const intercept = (t0 - slope*s1) / s0;
                predict = ts => Math.max(0, Math.min(maxDur, slope*toX(ts) + intercept));
            }

            // ─── 第二步：二分法求解推荐发送时间 ───
            // 正确公式：recTs + predict(recTs) = 15:00:00
            // 而非近似：recTs = 15:00 - predict(15:00)
            // 在耗时快速变化时，二分法结果更准确（误差可缩小数十秒）
            let lo = Math.max(min, relTsMs - maxDur), hi = relTsMs;
            for (let i = 0; i < 60; i++) {
                const mid = (lo + hi) / 2;
                if (mid + predict(mid) < relTsMs) lo = mid; else hi = mid;
            }
            const recTs = Math.round((lo + hi) / 2);
            const predDurAtRec = predict(recTs); // 推荐时间点的预测耗时

            // 生成预测曲线（游标 → 15:00，2s步长确保平滑）
            const svgX = ts => (ts - min) / span * W;
            const svgY = d  => padT + (1 - Math.min(Math.max(d, 0), maxDur) / maxDur) * chartH;
            const predPtsObjs = [];
            const step = 500;
            for (let t = cursorTs; t < relTsMs; t += step) {
                predPtsObjs.push({ x: svgX(t), y: svgY(predict(t)) });
            }
            predPtsObjs.push({ x: svgX(relTsMs), y: svgY(predict(relTsMs)) });

            const cssXP = ts => (((ts - min) / span) * 100).toFixed(3);
            const fmtTs = ts => {
                const d = new Date(ts);
                return String(d.getHours()).padStart(2,'0') + ':' +
                       String(d.getMinutes()).padStart(2,'0') + ':' +
                       String(d.getSeconds()).padStart(2,'0') + '.' +
                       String(d.getMilliseconds()).padStart(3,'0');
            };

            return {
                svgPath:    buildSmoothPath(predPtsObjs),
                predDurAtRec,
                recTs,
                recXPct:    cssXP(recTs),
                recTimeStr: fmtTs(recTs),
                durStr:     formatDuration(predDurAtRec),
                n:          last6.length,
                inRange:    recTs >= min && recTs <= relTsMs
            };
        }

        // ── 轻量 DOM 更新：拖动游标时不触发整体 render ──
        function updateDurationCursorDOM() {
            const pd = state.processedData;
            const proxyData = state._currentProxyData;
            if (!pd || !proxyData) return;

            const { timeRange } = pd;
            const { min, max, span } = timeRange;
            const maxDur = 60000;
            const H = 100, padT = 5, padB = 3;
            const chartH = H - padT - padB;
            const W = 10000;

            // 直接复用全量渲染时缓存的滑动窗口趋势点，避免拖动时重复计算
            const allTrendPts = state._slidePts || [];

            const relTs = new Date(min); relTs.setHours(15, 0, 0, 0);
            const relTsMs = relTs.getTime();
            const cursorTs = state.durationCursorTime;
            if (!cursorTs) return;

            const cssXP = ts => (((ts - min) / span) * 100).toFixed(3);

            // 1. 移动游标
            const cursorEl = document.getElementById('durationCursor');
            if (cursorEl) cursorEl.style.left = cssXP(cursorTs) + '%';

            // 2. 计算预测
            const predResult = computeDurationPrediction(allTrendPts, cursorTs, relTsMs, min, span, maxDur, W, H, padT, chartH);

            // 3. 更新预测曲线（平滑路径）
            const predCurveEl = document.getElementById('durationPredCurve');
            if (predCurveEl) predCurveEl.setAttribute('d', predResult ? predResult.svgPath : '');

            // 4. 更新建议标线（直接重写 innerHTML 最简单可靠）
            const recMarkerEl = document.getElementById('durationRecMarker');
            if (recMarkerEl) {
                if (predResult && predResult.inRange) {
                    recMarkerEl.style.display = '';
                    recMarkerEl.style.left = predResult.recXPct + '%';
                    recMarkerEl.style.width = '0';
                    recMarkerEl.style.borderLeft = '2px dashed #a855f7';
                    recMarkerEl.style.transform = 'translateX(-50%)';
                    recMarkerEl.innerHTML = `<div style="position:absolute;top:3px;left:5px;white-space:nowrap;background:rgba(10,16,30,0.88);padding:2px 6px;border-radius:3px;border:1px solid rgba(168,85,247,0.4);"><div style="font-size:10px;color:#a855f7;font-family:monospace;font-weight:600;">📍 预测查票: ${predResult.recTimeStr}</div><div style="font-size:9px;color:#64748b;margin-top:1px;">预测耗时=${predResult.durStr} · n=${predResult.n}</div></div>`;
                } else {
                    recMarkerEl.style.display = 'none';
                }
            }

            // 5. 更新头部标签
            const recLabelEl = document.getElementById('durationRecLabel');
            if (recLabelEl) {
                if (predResult && predResult.inRange) {
                    recLabelEl.innerHTML = `📍 预测查票: ${predResult.recTimeStr} <span style="color:#475569;font-weight:400;">(预测耗时=${predResult.durStr})</span>`;
                    recLabelEl.style.color = '#a855f7';
                } else {
                    recLabelEl.textContent = '拖动游标查看预测';
                    recLabelEl.style.color = '#64748b';
                }
            }
        }

        function bindEvents() {
            document.getElementById('refreshFromServerBtn')?.addEventListener('click', () => autoLoadFromServer());

            document.getElementById('ticketDbInput')?.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                try {
                    let addedCount = 0;
                    for (const file of files) {
                        const dbKey = `${file.name}|${file.size}|${file.lastModified}`;
                        if (ticketDbs.find(d => d.dbKey === dbKey)) continue;
                        const db = await loadDatabase(file);
                        ticketDbs.push({ name: file.name, dbKey, size: file.size, lastModified: file.lastModified, db });
                        const tables = getTables(db);
                        const newBatches = getTestBatches(tables, db, file.name, dbKey);
                        newBatches.forEach(b => {
                            if (!state.batches.find(existing => {
                                if (existing.suffix !== b.suffix) return false;
                                if (existing.dbKey === b.dbKey) return true;
                                // 同suffix不同文件：用channel行数判断是否为复制项目产生的重复
                                return getChannelRowCount(existing.db, existing.tables['channel']) === getChannelRowCount(b.db, b.tables['channel']);
                            })) {
                                b.uid = state._uidCounter++;
                                detectBatchQueryType(b);
                                state.batches.push(b);
                                addedCount++;
                            }
                        });
                    }
                    state.batches.sort((a, b) => b.suffix.localeCompare(a.suffix));
                    state.batches = filterLatestBeforeThree(state.batches);
                    state.ticketDbLoaded = ticketDbs.length > 0;
                    if (state.batches.length > 0 && state.selectedBatches.length === 0) {
                        state.selectedBatches = [state.batches[0]];
                        loadAndProcessBatch();
                    } else if (addedCount > 0 && !state.processedData) {
                        state.selectedBatches = [state.batches[0]];
                        loadAndProcessBatch();
                    }
                    if (addedCount === 0 && files.length > 0) {
                        alert('所选文件已全部加载过，未新增数据库。');
                    }
                    render();
                } catch (err) {
                    alert('加载失败: ' + err.message);
                }
                e.target.value = '';
            });

            document.getElementById('clearDbsBtn')?.addEventListener('click', () => {
                ticketDbs = [];
                ticketDb = null;
                state.ticketDbLoaded = false;
                state.batches = [];
                state.selectedBatches = [];
                state.selectedProxy = null;
                state.lastChannelProxy = null;
                state.selectedProxies = new Set();
                state.processedData = null;
                state._uidCounter = 0;
                render();
            });
            
            document.getElementById('folderDbInput')?.addEventListener('change', async (e) => {
                const fileList = e.target.files;
                const totalFiles = fileList.length;
                if (totalFiles === 0) return;

                // 第一阶段：扫描文件名（数万文件时这步本身耗时）
                showProgress('扫描文件中...', 0, totalFiles, `共 ${totalFiles} 个文件`);
                // 两次 setTimeout(0)：让浏览器真正完成重绘后再开始 CPU 密集循环
                await new Promise(r => setTimeout(r, 0));
                await new Promise(r => setTimeout(r, 0));

                const dbFiles = [];
                const CHUNK = 3000;
                for (let i = 0; i < totalFiles; i += CHUNK) {
                    const end = Math.min(i + CHUNK, totalFiles);
                    for (let j = i; j < end; j++) {
                        const f = fileList[j];
                        if (/\.(db|sqlite|sqlite3)$/i.test(f.name)) dbFiles.push(f);
                    }
                    updateProgress(end, totalFiles, `已扫描 ${end} / ${totalFiles}，找到 ${dbFiles.length} 个数据库`);
                    await new Promise(r => setTimeout(r, 0));
                }

                if (dbFiles.length === 0) { hideProgress(); return; }

                // 第二阶段：逐个加载数据库
                const total = dbFiles.length;
                showProgress('加载数据库', 0, total, '');
                let ticketAdded = 0;
                let proxyLoaded = false;
                for (let i = 0; i < dbFiles.length; i++) {
                    const file = dbFiles[i];
                    updateProgress(i, total, file.webkitRelativePath || file.name);
                    const dbKey = `${file.webkitRelativePath || file.name}|${file.size}|${file.lastModified}`;
                    if (ticketDbs.find(d => d.dbKey === dbKey)) continue;
                    let db;
                    try { db = await loadDatabase(file); } catch (err) { continue; }
                    const tables = getTables(db);
                    const newBatches = getTestBatches(tables, db, file.webkitRelativePath || file.name, dbKey);
                    if (newBatches.length > 0) {
                        ticketDbs.push({ name: file.webkitRelativePath || file.name, dbKey, size: file.size, lastModified: file.lastModified, db });
                        newBatches.forEach(b => {
                            if (!state.batches.find(ex => {
                                if (ex.suffix !== b.suffix) return false;
                                if (ex.dbKey === b.dbKey) return true;
                                // 同suffix不同文件：用channel行数判断是否为复制项目产生的重复
                                return getChannelRowCount(ex.db, ex.tables['channel']) === getChannelRowCount(b.db, b.tables['channel']);
                            })) {
                                b.uid = state._uidCounter++;
                                detectBatchQueryType(b);
                                state.batches.push(b);
                                ticketAdded++;
                            }
                        });
                        continue;
                    }
                    if (!proxyLoaded && !state.proxyDbLoaded && tables.includes('proxies')) {
                        await loadRiskData();
                        proxyDb = db;
                        state.proxyDbLoaded = true;
                        state.proxyInfo = loadProxyInfo(proxyDb);
                        proxyLoaded = true;
                    }
                }
                hideProgress();
                state.batches.sort((a, b) => b.suffix.localeCompare(a.suffix));
                state.batches = filterLatestBeforeThree(state.batches);
                state.ticketDbLoaded = ticketDbs.length > 0;
                if (ticketAdded > 0 && state.selectedBatches.length === 0) {
                    state.selectedBatches = [state.batches[0]];
                    loadAndProcessBatch();
                } else if ((ticketAdded > 0 || proxyLoaded) && state.selectedBatches.length > 0) {
                    loadAndProcessBatch();
                }
                render();
                e.target.value = '';
            });

            document.getElementById('scanBlacklistBtn')?.addEventListener('click', () => scanAllBatchesForBlacklist());

            document.getElementById('proxyDbInput')?.addEventListener('change', async (e) => {
                if (e.target.files[0]) {
                    try {
                        await loadRiskData();
                        proxyDb = await loadDatabase(e.target.files[0]);
                        state.proxyDbLoaded = true;
                        state.proxyInfo = loadProxyInfo(proxyDb);
                        if (state.selectedBatches.length > 0) loadAndProcessBatch();
                        render();
                    } catch (err) {
                        alert('加载失败: ' + err.message);
                    }
                }
            });
            
            document.querySelectorAll('.batch-item').forEach(el => {
                el.addEventListener('click', () => {
                    const batch = state.batches.find(b => b.uid === parseInt(el.dataset.batch));
                    if (!batch) return;
                    if (state.selectedBatches.length === 0) {
                        state.selectedBatches = [batch];
                        onBatchSelectionChanged();
                        render();
                    } else {
                        toggleBatch(batch.uid);
                    }
                });
            });

            document.querySelectorAll('.proxy-item').forEach(el => {
                el.addEventListener('click', () => {
                    if (state.viewMode === 'channel') {
                        state.selectedProxy = el.dataset.proxy;
                        state.lastChannelProxy = el.dataset.proxy;
                        state.selectedTargetHost = null;
                        render();
                    } else {
                        toggleProxy(el.dataset.proxy);
                    }
                });
            });

            // 多选批次·通道视图：批次页签切换
            document.querySelectorAll('[data-channel-batch]').forEach(el => {
                el.addEventListener('click', () => {
                    state.channelBatchUid = parseInt(el.dataset.channelBatch, 10);
                    render();
                });
            });

            document.getElementById('batchNavPrev')?.addEventListener('click', () => navigateBatch(-1));
            document.getElementById('batchNavNext')?.addEventListener('click', () => navigateBatch(1));

            // 批次日期筛选
            document.getElementById('batchDateSelect')?.addEventListener('change', e => {
                const val = e.target.value;
                setTimeout(() => {
                    state.batchDateFilter = val || null;
                    if (state.batchDateFilter) {
                        // Filter out selected batches that don't match the date filter
                        state.selectedBatches = state.selectedBatches.filter(b => b.suffix.startsWith(state.batchDateFilter));
                        if (state.selectedBatches.length === 0) {
                            const first = state.batches.find(b => b.suffix.startsWith(state.batchDateFilter));
                            if (first) { state.selectedBatches = [first]; onBatchSelectionChanged(); render(); return; }
                        }
                    }
                    render();
                }, 0);
            });

            // 目标服务器筛选
            document.getElementById('targetHostAll')?.addEventListener('click', () => {
                state.selectedTargetHost = null;
                render();
            });
            document.querySelectorAll('[data-target-host]').forEach(el => {
                el.addEventListener('click', () => {
                    state.selectedTargetHost = el.dataset.targetHost;
                    render();
                });
            });

            // 耗时图模式切换
            document.getElementById('durationModeProxy')?.addEventListener('click', () => {
                state.durationMode = 'proxy';
                render();
            });
            document.getElementById('durationModeBatch')?.addEventListener('click', () => {
                state.durationMode = 'batch';
                render();
            });

            // 耗时图游标拖动：mousedown 启动拖动
            document.addEventListener('mousedown', (e) => {
                if (e.target.closest('#durationCursor')) {
                    _isDraggingDuration = true;
                    e.preventDefault();
                }
            });

            document.getElementById('zoomSlider')?.addEventListener('input', (e) => {
                state.zoomLevel = parseFloat(e.target.value);
                render();
            });
            
            document.getElementById('zoomIn')?.addEventListener('click', () => {
                state.zoomLevel = Math.min(20, state.zoomLevel * 1.2);
                render();
            });
            
            document.getElementById('zoomOut')?.addEventListener('click', () => {
                state.zoomLevel = Math.max(0.5, state.zoomLevel / 1.2);
                render();
            });
            
            document.getElementById('zoomReset')?.addEventListener('click', () => {
                state.zoomLevel = 1;
                render();
            });
            
            // 同步滚动：时间轴和通道视图
            const channelsView = document.getElementById('channelsView');
            const rulerWrapper = document.getElementById('rulerWrapper');
            const hbSummaryWrapper = document.getElementById('hbSummaryWrapper');

            if (channelsView && rulerWrapper) {
                channelsView.addEventListener('scroll', () => {
                    rulerWrapper.scrollLeft = channelsView.scrollLeft;
                    if (hbSummaryWrapper) hbSummaryWrapper.scrollLeft = channelsView.scrollLeft;
                    const durationChartWrapper = document.getElementById('durationChartWrapper');
                    if (durationChartWrapper) durationChartWrapper.scrollLeft = channelsView.scrollLeft;
                });

                rulerWrapper.addEventListener('scroll', () => {
                    channelsView.scrollLeft = rulerWrapper.scrollLeft;
                });
                
                // Ctrl+滚轮缩放
                channelsView.addEventListener('wheel', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        e.preventDefault();
                        state.zoomLevel = Math.max(0.5, Math.min(20, state.zoomLevel * (e.deltaY > 0 ? 0.9 : 1.1)));
                        render();
                    }
                }, { passive: false });
            }
            
            // Tooltip - 带500ms延迟
            document.querySelectorAll('[data-tip]').forEach(el => {
                el.addEventListener('mouseenter', (e) => {
                    showTooltip(el, e);
                });
                
                el.addEventListener('mousemove', (e) => {
                    updateTooltipPosition(e);
                });
                
                el.addEventListener('mouseleave', () => {
                    clearTooltip();
                });
            });
        }
        
        // ── 耗时图游标拖动全局状态 ──
        let _isDraggingDuration = false;

        document.addEventListener('mousemove', (e) => {
            if (!_isDraggingDuration) return;
            const pd = state.processedData;
            if (!pd) return;
            const { min, span } = pd.timeRange;
            const wrapperEl = document.getElementById('durationChartWrapper');
            const timelineEl = wrapperEl?.querySelector('.duration-chart-timeline');
            if (!wrapperEl || !timelineEl) return;
            const wrapperRect = wrapperEl.getBoundingClientRect();
            const labelEl = timelineEl.previousElementSibling;
            const labelW = labelEl ? labelEl.offsetWidth : 60;
            const timelineW = timelineEl.offsetWidth;
            if (timelineW <= 0) return;
            const mouseX = (e.clientX - wrapperRect.left - labelW) + wrapperEl.scrollLeft;
            const pct = Math.max(0, Math.min(1, mouseX / timelineW));
            state.durationCursorTime = Math.round(min + pct * span);
            updateDurationCursorDOM();
        });

        document.addEventListener('mouseup', () => {
            _isDraggingDuration = false;
        });

        initDatabase();
    </script>
</body>
</html>
